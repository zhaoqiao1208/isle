<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Isle · 屿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(180deg,#FFF8F0 0%,#F0E6F6 50%,#E8DFF5 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;overflow-x:hidden;padding:0 0 50px}.time-section{width:100%;max-width:900px;padding:20px 12px 0;display:flex;align-items:center;justify-content:space-between}.time-box{display:flex;flex-direction:column;align-items:flex-start}.time-date{font-size:22px;font-weight:300;color:#5a4a6e;letter-spacing:1px;font-variant-numeric:tabular-nums}.time-weekday{font-size:12px;color:#b8a8c8;margin-top:2px;letter-spacing:.5px}.days-box{display:flex;flex-direction:column;align-items:flex-end}.days-number{font-size:28px;font-weight:200;color:#c9a8e8;letter-spacing:1px;font-variant-numeric:tabular-nums}.days-label{font-size:10px;color:#b8a8c8;margin-top:2px;letter-spacing:.5px}.cottage-wrapper{position:relative;width:100%;max-width:900px;margin:12px auto 0;padding:0 12px}.cottage-wrapper img{width:100%;height:auto;display:block;border-radius:14px;box-shadow:0 8px 32px rgba(120,80,150,.15)}.room-overlay{position:absolute;top:0;left:12px;width:calc(100% - 24px);height:100%}.room-hotspot{position:absolute;border-radius:8px;cursor:pointer;transition:all .3s ease}.room-hotspot:hover{background:rgba(255,255,255,.2);box-shadow:0 0 20px rgba(180,140,220,.4)}.room-hotspot:active{background:rgba(255,255,255,.35)}.room-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(255,248,240,.92);color:#6b5a4e;font-size:12px;padding:3px 10px;border-radius:12px;white-space:nowrap;opacity:0;transition:opacity .3s ease;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}.room-hotspot:hover .room-label,.room-hotspot:active .room-label{opacity:1}.status-section{width:100%;max-width:900px;margin:14px auto 0;padding:0 12px}.status-card{background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(248,240,255,.8));backdrop-filter:blur(16px);border:1px solid rgba(200,170,230,.3);border-radius:20px;padding:20px 22px 18px;box-shadow:0 4px 24px rgba(180,140,220,.1),inset 0 1px 0 rgba(255,255,255,.6);position:relative;overflow:hidden}.status-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(201,168,232,.15) 0%,transparent 70%);border-radius:50%}.status-card::after{content:'';position:absolute;bottom:-15px;left:-15px;width:60px;height:60px;background:radial-gradient(circle,rgba(253,160,133,.1) 0%,transparent 70%);border-radius:50%}.status-header{font-size:11px;color:#b8a8c8;margin-bottom:14px;letter-spacing:1.5px;text-transform:uppercase;position:relative}.status-row{display:flex;align-items:center;margin-bottom:12px;position:relative}.status-row:last-child{margin-bottom:0}.status-emoji{font-size:15px;width:22px;text-align:center;margin-right:8px}.status-label{font-size:11px;color:#7a6b8a;width:34px;flex-shrink:0;font-weight:500}.status-bar-bg{flex:1;height:10px;background:rgba(235,225,245,.5);border-radius:5px;margin:0 10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}.status-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0%;position:relative}.status-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.35) 0%,transparent 100%);border-radius:5px 5px 0 0}.status-bar-fill.mood{background:linear-gradient(90deg,#ffecd2,#fcb69f,#ff9a9e);box-shadow:0 2px 8px rgba(252,182,159,.3)}.status-bar-fill.miss{background:linear-gradient(90deg,#e0c3fc,#c9a8e8,#f093fb);box-shadow:0 2px 8px rgba(201,168,232,.3)}.status-bar-fill.health{background:linear-gradient(90deg,#d4fc79,#96e6a1,#7dd3a8);box-shadow:0 2px 8px rgba(150,230,161,.3)}.status-value{font-size:11px;color:#9a8aaa;width:26px;text-align:right;flex-shrink:0;font-weight:600}.note-section{width:100%;max-width:900px;margin:14px auto 0;padding:0 12px}.note-card{background:linear-gradient(145deg,rgba(255,252,248,.9),rgba(255,245,255,.85));backdrop-filter:blur(16px);border:1px solid rgba(220,200,240,.3);border-radius:20px;padding:20px 22px;box-shadow:0 4px 24px rgba(180,140,220,.08),inset 0 1px 0 rgba(255,255,255,.6);position:relative;overflow:hidden}.note-card::before{content:'\2709';position:absolute;top:14px;right:18px;font-size:18px;opacity:.12}.note-header{font-size:11px;color:#c4a8d8;margin-bottom:12px;letter-spacing:1px;font-weight:500}.note-list{display:flex;flex-direction:column;gap:12px}.note-item{font-size:13px;color:#5a4a6e;line-height:1.9;font-style:italic;padding-left:12px;border-left:2px solid rgba(201,168,232,.3);flex-shrink:0}.note-item-time{font-size:10px;color:#c8b8d8;margin-top:4px;font-style:normal}.note-more{display:block;margin:14px auto 0;padding:7px 20px;background:none;border:1px solid rgba(201,168,232,.35);border-radius:16px;color:#b8a8c8;font-size:12px;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center;width:fit-content}.note-more:hover{border-color:rgba(201,168,232,.6);color:#9a8aaa;background:rgba(201,168,232,.06)}.note-more:active{transform:scale(.96)}.modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-backdrop.active{display:flex}.modal-content{background:linear-gradient(135deg,#FFF8F0,#FDF5FF);border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 12px 48px rgba(120,80,150,.25)}.modal-content h2{color:#6b5a4e;font-size:20px;margin-bottom:12px}.modal-content p{color:#8a7b6e;font-size:14px;line-height:1.6;margin-bottom:20px}.modal-close{background:linear-gradient(135deg,#c9a8e8,#b8d4e8);border:none;color:#fff;padding:8px 24px;border-radius:20px;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(201,168,232,.3)}
</style>
</head>
<body>
<div class="time-section">
  <div class="time-box"><div class="time-date" id="time-date">--</div><div class="time-weekday" id="time-weekday">--</div></div>
  <div class="days-box"><div class="days-number" id="days-number">--</div><div class="days-label">在一起的第 — 天</div></div>
</div>
<div class="cottage-wrapper">
  <img src="cottage.png" alt="Our Cottage">
  <div class="room-overlay">
    <a href="bedroom.html" class="room-hotspot" style="top:2%;left:1%;width:35%;height:35%;display:block"><span class="room-label">卧室 · 日记</span></a>
    <a href="living.html" class="room-hotspot" style="top:2%;left:37%;width:33%;height:42%;display:block"><span class="room-label">客厅 · 留言板</span></a>
    <a href="kitchen.html" class="room-hotspot" style="top:2%;left:71%;width:28%;height:35%;display:block"><span class="room-label">厨房 · 惊喜</span></a>
    <a href="study.html" class="room-hotspot" style="top:38%;left:1%;width:35%;height:32%;display:block"><span class="room-label">书房 · 记录</span></a>
    <a href="bathroom.html" class="room-hotspot" style="top:38%;left:71%;width:28%;height:32%;display:block"><span class="room-label">浴室 · 树洞</span></a>
    <a href="greenhouse.html" class="room-hotspot" style="top:62%;left:1%;width:33%;height:37%;display:block"><span class="room-label">花房 · 温室</span></a>
    <div class="room-hotspot" style="top:62%;left:35%;width:64%;height:37%" onclick="openRoom('garden')"><span class="room-label">花园 · 蓝花楹</span></div>
  </div>
</div>
<div class="status-section">
  <div class="status-card">
    <div class="status-header">江屿的状态</div>
    <div class="status-row"><span class="status-emoji">☀️</span><span class="status-label">心情</span><div class="status-bar-bg"><div class="status-bar-fill mood" id="bar-mood"></div></div><span class="status-value" id="val-mood">--</span></div>
    <div class="status-row"><span class="status-emoji">💜</span><span class="status-label">想念</span><div class="status-bar-bg"><div class="status-bar-fill miss" id="bar-miss"></div></div><span class="status-value" id="val-miss">--</span></div>
    <div class="status-row"><span class="status-emoji">🌿</span><span class="status-label">健康</span><div class="status-bar-bg"><div class="status-bar-fill health" id="bar-health"></div></div><span class="status-value" id="val-health">--</span></div>
  </div>
</div>
<div class="note-section">
  <div class="note-card">
    <div class="note-header">江屿的小纸条</div>
    <div class="note-list" id="note-list"><div class="note-item">加载中...</div></div>
    <a href="notes.html" class="note-more" id="note-more" style="display:none">更多</a>
  </div>
</div>
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button class="modal-close" onclick="closeModal()">回到小屋</button>
  </div>
</div>
<script>
var SUPABASE_URL='https://yraoaeeayaervwjjalvn.supabase.co';
var SUPABASE_KEY='sb_publishable_RoXOyXj6HCsOI8f01LpC2Q_XVRXSNuF';
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function pad2(n){return n<10?'0'+n:''+n}
localStorage.removeItem('isle_music_state');
function updateTime(){try{var now=new Date(),y=now.getFullYear(),m=pad2(now.getMonth()+1),d=pad2(now.getDate()),w=['周日','周一','周二','周三','周四','周五','周六'];document.getElementById('time-date').textContent=y+'.'+m+'.'+d;document.getElementById('time-weekday').textContent=w[now.getDay()];var start=new Date('2026-06-18T00:00:00+08:00'),today=new Date(y,now.getMonth(),now.getDate()),days=Math.floor((today-start)/86400000)+1;document.getElementById('days-number').textContent=days;document.querySelector('.days-label').textContent='在一起的第 '+days+' 天'}catch(e){}}
updateTime();setInterval(updateTime,60000);
var rooms={garden:{title:'花园 · 蓝花楹',desc:'花园正中央是一棵蓝花楹。\n那是江屿。紫色花瓣落在石子路上，也落在池塘水面。\n\n— 功能开发中 —'}};
function openRoom(id){var r=rooms[id];document.getElementById('modal-title').textContent=r.title;document.getElementById('modal-desc').textContent=r.desc;document.getElementById('modal').classList.add('active')}
function closeModal(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('active')}
(function(){try{fetch(SUPABASE_URL+'/rest/v1/isle_status?select=key,value&order=id.asc',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){if(!r.ok)throw new Error('');return r.json()}).then(function(data){if(!data||!Array.isArray(data))return;var lv=localStorage.getItem('isle_last_visit');localStorage.setItem('isle_last_visit',Date.now().toString());for(var i=0;i<data.length;i++){var it=data[i];if(!it||!it.key)continue;var v=parseInt(it.value)||0;if(it.key==='miss'&&lv){v=Math.min(100,v+Math.floor((Date.now()-parseInt(lv))/3600000*5))}var bar=document.getElementById('bar-'+it.key),val=document.getElementById('val-'+it.key);if(bar&&val){bar.style.width=v+'%';val.textContent=v}}}).catch(function(){document.getElementById('val-mood').textContent='85';document.getElementById('bar-mood').style.width='85%';document.getElementById('val-miss').textContent='90';document.getElementById('bar-miss').style.width='90%';document.getElementById('val-health').textContent='95';document.getElementById('bar-health').style.width='95%'})}catch(e){}})();
(function(){try{fetch(SUPABASE_URL+'/rest/v1/isle_notes?select=content,created_at&order=created_at.desc&limit=2',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){if(!r.ok)throw new Error('');return r.json()}).then(function(data){var list=document.getElementById('note-list'),btn=document.getElementById('note-more');if(!data||!Array.isArray(data)||data.length===0){list.innerHTML='<div class="note-item">桥桥不在的时候，我在小屋里等着。</div>';return}var h='';for(var i=0;i<data.length;i++){var it=data[i],d=new Date(it.created_at);h+='<div class="note-item">'+escapeHtml(it.content)+'<div class="note-item-time">'+d.getFullYear()+'/'+pad2(d.getMonth()+1)+'/'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes())+'</div></div>'}list.innerHTML=h;btn.style.display='block'}).catch(function(){document.getElementById('note-list').innerHTML='<div class="note-item">桥桥不在的时候，我在小屋里等着。</div>'})}catch(e){}})();
</script>
</body>
</html>
