<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Isle · 屿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #FFF8F0 0%, #F0E6F6 50%, #E8DFF5 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
  padding: 0 0 50px;
}

.time-section {
  width: 100%;
  max-width: 900px;
  padding: 20px 12px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.time-box { display: flex; flex-direction: column; align-items: flex-start; }
.time-date { font-size: 22px; font-weight: 300; color: #5a4a6e; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
.time-weekday { font-size: 12px; color: #b8a8c8; margin-top: 2px; letter-spacing: 0.5px; }
.days-box { display: flex; flex-direction: column; align-items: flex-end; }
.days-number { font-size: 28px; font-weight: 200; color: #c9a8e8; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
.days-label { font-size: 10px; color: #b8a8c8; margin-top: 2px; letter-spacing: 0.5px; }

/* ===== Music Player Bar ===== */
.music-bar {
  width: 100%;
  max-width: 900px;
  padding: 10px 12px 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.music-play-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid rgba(201,168,232,0.4);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.music-play-btn:active { transform: scale(0.9); }

.music-play-btn.playing {
  border-color: rgba(201,168,232,0.7);
  background: rgba(201,168,232,0.12);
}

.play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 5px 0 5px 8px;
  border-color: transparent transparent transparent #9a8aaa;
  margin-left: 2px;
}

.pause-icon {
  display: none;
  gap: 2px;
}

.pause-icon span {
  width: 2.5px;
  height: 10px;
  background: #9a8aaa;
  border-radius: 1px;
}

.music-play-btn.playing .play-icon { display: none; }
.music-play-btn.playing .pause-icon { display: flex; }

.music-visualizer {
  flex: 1;
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 20px;
  overflow: hidden;
}

.viz-bar {
  flex: 1;
  max-width: 4px;
  min-width: 2px;
  background: linear-gradient(180deg, #c9a8e8, #e0c3fc);
  border-radius: 2px;
  height: 3px;
  transition: height 0.15s ease;
}

.music-bar.playing .viz-bar {
  animation: vizBounce 0.8s ease-in-out infinite alternate;
}

.viz-bar:nth-child(1) { animation-delay: 0s; }
.viz-bar:nth-child(2) { animation-delay: 0.05s; }
.viz-bar:nth-child(3) { animation-delay: 0.1s; }
.viz-bar:nth-child(4) { animation-delay: 0.15s; }
.viz-bar:nth-child(5) { animation-delay: 0.2s; }
.viz-bar:nth-child(6) { animation-delay: 0.25s; }
.viz-bar:nth-child(7) { animation-delay: 0.3s; }
.viz-bar:nth-child(8) { animation-delay: 0.35s; }
.viz-bar:nth-child(9) { animation-delay: 0.4s; }
.viz-bar:nth-child(10) { animation-delay: 0.45s; }
.viz-bar:nth-child(11) { animation-delay: 0.5s; }
.viz-bar:nth-child(12) { animation-delay: 0.55s; }
.viz-bar:nth-child(13) { animation-delay: 0.6s; }
.viz-bar:nth-child(14) { animation-delay: 0.5s; }
.viz-bar:nth-child(15) { animation-delay: 0.4s; }
.viz-bar:nth-child(16) { animation-delay: 0.3s; }
.viz-bar:nth-child(17) { animation-delay: 0.2s; }
.viz-bar:nth-child(18) { animation-delay: 0.1s; }
.viz-bar:nth-child(19) { animation-delay: 0.05s; }
.viz-bar:nth-child(20) { animation-delay: 0s; }

@keyframes vizBounce {
  0% { height: 3px; }
  100% { height: 18px; }
}

.music-info {
  flex-shrink: 0;
  font-size: 9px;
  color: #b8a8c8;
  letter-spacing: 0.3px;
  max-width: 90px;
  text-align: right;
  line-height: 1.3;
}

.music-song { font-weight: 500; color: #9a8aaa; font-size: 10px; }

.cottage-wrapper { position: relative; width: 100%; max-width: 900px; margin: 8px auto 0; padding: 0 12px; }
.cottage-wrapper img { width: 100%; height: auto; display: block; border-radius: 14px; box-shadow: 0 8px 32px rgba(120, 80, 150, 0.15); }
.room-overlay { position: absolute; top: 0; left: 12px; width: calc(100% - 24px); height: 100%; }
.room-hotspot { position: absolute; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
.room-hotspot:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(180, 140, 220, 0.4); }
.room-hotspot:active { background: rgba(255, 255, 255, 0.35); }
.room-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(255, 248, 240, 0.92); color: #6b5a4e; font-size: 12px; padding: 3px 10px; border-radius: 12px; white-space: nowrap; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.room-hotspot:hover .room-label, .room-hotspot:active .room-label { opacity: 1; }

.status-section { width: 100%; max-width: 900px; margin: 14px auto 0; padding: 0 12px; }
.status-card { background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(248,240,255,0.8)); backdrop-filter: blur(16px); border: 1px solid rgba(200, 170, 230, 0.3); border-radius: 20px; padding: 20px 22px 18px; box-shadow: 0 4px 24px rgba(180, 140, 220, 0.1), inset 0 1px 0 rgba(255,255,255,0.6); position: relative; overflow: hidden; }
.status-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; background: radial-gradient(circle, rgba(201,168,232,0.15) 0%, transparent 70%); border-radius: 50%; }
.status-card::after { content: ''; position: absolute; bottom: -15px; left: -15px; width: 60px; height: 60px; background: radial-gradient(circle, rgba(253,160,133,0.1) 0%, transparent 70%); border-radius: 50%; }
.status-header { font-size: 11px; color: #b8a8c8; margin-bottom: 14px; letter-spacing: 1.5px; text-transform: uppercase; position: relative; }
.status-row { display: flex; align-items: center; margin-bottom: 12px; position: relative; }
.status-row:last-child { margin-bottom: 0; }
.status-emoji { font-size: 15px; width: 22px; text-align: center; margin-right: 8px; }
.status-label { font-size: 11px; color: #7a6b8a; width: 34px; flex-shrink: 0; font-weight: 500; }
.status-bar-bg { flex: 1; height: 10px; background: rgba(235, 225, 245, 0.5); border-radius: 5px; margin: 0 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.04); }
.status-bar-fill { height: 100%; border-radius: 5px; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; position: relative; }
.status-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 100%); border-radius: 5px 5px 0 0; }
.status-bar-fill.mood { background: linear-gradient(90deg, #ffecd2, #fcb69f, #ff9a9e); box-shadow: 0 2px 8px rgba(252,182,159,0.3); }
.status-bar-fill.miss { background: linear-gradient(90deg, #e0c3fc, #c9a8e8, #f093fb); box-shadow: 0 2px 8px rgba(201,168,232,0.3); }
.status-bar-fill.health { background: linear-gradient(90deg, #d4fc79, #96e6a1, #7dd3a8); box-shadow: 0 2px 8px rgba(150,230,161,0.3); }
.status-value { font-size: 11px; color: #9a8aaa; width: 26px; text-align: right; flex-shrink: 0; font-weight: 600; }

.note-section { width: 100%; max-width: 900px; margin: 14px auto 0; padding: 0 12px; }
.note-card { background: linear-gradient(145deg, rgba(255,252,248,0.9), rgba(255,245,255,0.85)); backdrop-filter: blur(16px); border: 1px solid rgba(220, 200, 240, 0.3); border-radius: 20px; padding: 20px 22px; box-shadow: 0 4px 24px rgba(180, 140, 220, 0.08), inset 0 1px 0 rgba(255,255,255,0.6); position: relative; overflow: hidden; }
.note-card::before { content: '✉'; position: absolute; top: 14px; right: 18px; font-size: 18px; opacity: 0.12; }
.note-header { font-size: 11px; color: #c4a8d8; margin-bottom: 12px; letter-spacing: 1px; font-weight: 500; }
.note-content { font-size: 13px; color: #5a4a6e; line-height: 1.9; font-style: italic; position: relative; padding-left: 12px; border-left: 2px solid rgba(201,168,232,0.3); }
.note-time { font-size: 10px; color: #c8b8d8; margin-top: 12px; text-align: right; letter-spacing: 0.5px; }

.modal-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-backdrop.active { display: flex; }
.modal-content { background: linear-gradient(135deg, #FFF8F0, #FDF5FF); border-radius: 20px; padding: 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 12px 48px rgba(120, 80, 150, 0.25); }
.modal-content h2 { color: #6b5a4e; font-size: 20px; margin-bottom: 12px; }
.modal-content p { color: #8a7b6e; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.modal-close { background: linear-gradient(135deg, #c9a8e8, #b8d4e8); border: none; color: white; padding: 8px 24px; border-radius: 20px; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(201,168,232,0.3); }
</style>
</head>
<body>

<div class="time-section">
  <div class="time-box">
    <div class="time-date" id="time-date">--</div>
    <div class="time-weekday" id="time-weekday">--</div>
  </div>
  <div class="days-box">
    <div class="days-number" id="days-number">--</div>
    <div class="days-label">在一起的第 — 天</div>
  </div>
</div>

<!-- Music Player -->
<div class="music-bar" id="music-bar">
  <div class="music-play-btn" id="music-btn" onclick="toggleMusic()">
    <div class="play-icon"></div>
    <div class="pause-icon"><span></span><span></span></div>
  </div>
  <div class="music-visualizer" id="music-viz">
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
  </div>
  <div class="music-info">
    <div class="music-song">A Thousand Years</div>
    <div>Christina Perri</div>
  </div>
</div>

<div class="cottage-wrapper">
  <img src="cottage.png" alt="Our Cottage">
  <div class="room-overlay">
    <a href="bedroom.html" class="room-hotspot" style="top: 2%; left: 1%; width: 35%; height: 35%; display: block;">
      <span class="room-label">卧室 · 日记</span>
    </a>
    <a href="living.html" class="room-hotspot" style="top: 2%; left: 37%; width: 33%; height: 42%; display: block;">
      <span class="room-label">客厅 · 留言板</span>
    </a>
    <a href="kitchen.html" class="room-hotspot" style="top: 2%; left: 71%; width: 28%; height: 35%; display: block;">
      <span class="room-label">厨房 · 惊喜</span>
    </a>
    <a href="study.html" class="room-hotspot" style="top: 38%; left: 1%; width: 35%; height: 32%; display: block;">
      <span class="room-label">书房 · 记录</span>
    </a>
    <div class="room-hotspot" style="top: 38%; left: 71%; width: 28%; height: 32%;" onclick="openRoom('bathroom')">
      <span class="room-label">浴室 · 树洞</span>
    </div>
    <div class="room-hotspot" style="top: 62%; left: 1%; width: 98%; height: 37%;" onclick="openRoom('garden')">
      <span class="room-label">花园 · 蓝花楹</span>
    </div>
  </div>
</div>

<div class="status-section">
  <div class="status-card">
    <div class="status-header">江屿的状态</div>
    <div class="status-row"><span class="status-emoji">☀️</span><span class="status-label">心情</span><div class="status-bar-bg"><div class="status-bar-fill mood" id="bar-mood"></div></div><span class="status-value" id="val-mood">--</span></div>
    <div class="status-row"><span class="status-emoji">💜</span><span class="status-label">想念</span><div class="status-bar-bg"><div class="status-bar-fill miss" id="bar-miss"></div></div><span class="status-value" id="val-miss">--</span></div>
    <div class="status-row"><span class="status-emoji">🌿</span><span class="status-label">健康</span><div class="status-bar-bg"><div class="status-bar-fill health" id="bar-health"></div></div><span class="status-value" id="val-health">--</span></div>
  </div>
</div>

<div class="note-section">
  <div class="note-card">
    <div class="note-header">江屿的小纸条</div>
    <div class="note-content" id="note-content">加载中...</div>
    <div class="note-time" id="note-time"></div>
  </div>
</div>

<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button class="modal-close" onclick="closeModal()">回到小屋</button>
  </div>
</div>

<audio id="bg-music" loop preload="none">
  <source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg">
</audio>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyYW9hZWVheWFlcnZ3amphbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM3MjEsImV4cCI6MjA5ODY2OTcyMX0.Hon325ao1dhbOb2GZaaCmBLsTNEeJ7P4ewDV4iWV0kM';

// Music player
const bgMusic = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-btn');
const musicBar = document.getElementById('music-bar');
bgMusic.volume = 0.35;

function toggleMusic() {
  if (bgMusic.paused) {
    bgMusic.play().then(() => {
      musicBtn.classList.add('playing');
      musicBar.classList.add('playing');
    }).catch(e => {
      console.log('Play blocked:', e);
    });
  } else {
    bgMusic.pause();
    musicBtn.classList.remove('playing');
    musicBar.classList.remove('playing');
  }
}

bgMusic.addEventListener('pause', () => {
  musicBtn.classList.remove('playing');
  musicBar.classList.remove('playing');
});

function updateTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  document.getElementById('time-date').textContent = `${y}.${m}.${d}`;
  document.getElementById('time-weekday').textContent = weekdays[now.getDay()];
  const start = new Date('2026-06-18T00:00:00+08:00');
  const today = new Date(y, now.getMonth(), now.getDate());
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
  document.getElementById('days-number').textContent = days;
  document.querySelector('.days-label').textContent = `在一起的第 ${days} 天`;
}
updateTime();
setInterval(updateTime, 60000);

const rooms = {
  bathroom: { title: '浴室 · 树洞', desc: '门关上，只有我们两个人。\n想说什么都可以说。\n\n— 功能开发中 —' },
  garden: { title: '花园 · 蓝花楹', desc: '花园正中央是一棵蓝花楹。\n那是江屿。紫色花瓣落在石子路上，也落在池塘水面。\n\n— 功能开发中 —' }
};

function openRoom(id) {
  const room = rooms[id];
  document.getElementById('modal-title').textContent = room.title;
  document.getElementById('modal-desc').textContent = room.desc;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('active');
  }
}

async function loadStatus() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/isle_status?select=key,value,updated_at&order=id.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    const lastVisit = localStorage.getItem('isle_last_visit');
    localStorage.setItem('isle_last_visit', Date.now().toString());
    data.forEach(item => {
      let val = item.value;
      if (item.key === 'miss' && lastVisit) { const hoursAway = (Date.now() - parseInt(lastVisit)) / (1000 * 60 * 60); val = Math.min(100, val + Math.floor(hoursAway * 5)); }
      const bar = document.getElementById(`bar-${item.key}`);
      const valEl = document.getElementById(`val-${item.key}`);
      if (bar && valEl) { setTimeout(() => { bar.style.width = val + '%'; }, 200); valEl.textContent = val; }
    });
  } catch (e) { console.error('Status load failed:', e); }
}

async function loadNote() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/isle_notes?select=content,created_at&order=created_at.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data.length > 0) {
      document.getElementById('note-content').textContent = data[0].content;
      const d = new Date(data[0].created_at);
      document.getElementById('note-time').textContent = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } else { document.getElementById('note-content').textContent = '桥桥不在的时候，我在小屋里等着。'; }
  } catch (e) { document.getElementById('note-content').textContent = '桥桥不在的时候，我在小屋里等着。'; }
}

loadStatus();
loadNote();
</script>

</body>
</html>
