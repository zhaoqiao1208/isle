<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Isle · 屿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #FFF8F0 0%, #F0E6F6 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
  padding: 20px 0 40px;
}

.cottage-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 20px auto 0;
}

.cottage-wrapper img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(120, 80, 150, 0.15);
}

.room-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.room-hotspot {
  position: absolute;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.room-hotspot:hover {
  background: rgba(255, 255, 255, 0.2);
  box-shadow: 0 0 20px rgba(180, 140, 220, 0.4);
}

.room-hotspot:active {
  background: rgba(255, 255, 255, 0.35);
}

.room-label {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 248, 240, 0.92);
  color: #6b5a4e;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.room-hotspot:hover .room-label,
.room-hotspot:active .room-label {
  opacity: 1;
}

/* Status Section */
.status-section {
  width: 100%;
  max-width: 900px;
  margin: 24px auto 0;
  padding: 0 16px;
}

.status-card {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 180, 220, 0.25);
  border-radius: 16px;
  padding: 20px 24px;
  box-shadow: 0 4px 20px rgba(120, 80, 150, 0.06);
}

.status-header {
  font-size: 12px;
  color: #a89b8e;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.status-row {
  display: flex;
  align-items: center;
  margin-bottom: 14px;
}

.status-row:last-child { margin-bottom: 0; }

.status-emoji {
  font-size: 16px;
  width: 24px;
  text-align: center;
  margin-right: 10px;
}

.status-label {
  font-size: 12px;
  color: #6b5a4e;
  width: 36px;
  flex-shrink: 0;
}

.status-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(220, 210, 230, 0.35);
  border-radius: 4px;
  margin: 0 12px;
  overflow: hidden;
}

.status-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.status-bar-fill.mood {
  background: linear-gradient(90deg, #f6d365, #fda085);
}

.status-bar-fill.miss {
  background: linear-gradient(90deg, #c9a8e8, #f093fb);
}

.status-bar-fill.health {
  background: linear-gradient(90deg, #a8e6cf, #88d8a8);
}

.status-value {
  font-size: 11px;
  color: #a89b8e;
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* Modal */
.modal-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-backdrop.active {
  display: flex;
}

.modal-content {
  background: linear-gradient(135deg, #FFF8F0, #FDF5FF);
  border-radius: 16px;
  padding: 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 12px 48px rgba(120, 80, 150, 0.25);
}

.modal-content h2 {
  color: #6b5a4e;
  font-size: 20px;
  margin-bottom: 12px;
}

.modal-content p {
  color: #8a7b6e;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
}

.modal-close {
  background: linear-gradient(135deg, #c9a8e8, #b8d4e8);
  border: none;
  color: white;
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
}

.title {
  color: #6b5a4e;
  font-size: 18px;
  margin-top: 16px;
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.subtitle {
  color: #a89b8e;
  font-size: 12px;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<p class="title">屿 · Isle</p>
<p class="subtitle">蓝花楹开在花园正中央</p>

<div class="cottage-wrapper">
  <img src="cottage.png" alt="Our Cottage">
  <div class="room-overlay">
    <!-- Bedroom: top-left → navigates to bedroom.html -->
    <a href="bedroom.html" class="room-hotspot" style="top: 2%; left: 1%; width: 35%; height: 35%; display: block;">
      <span class="room-label">卧室 · 日记</span>
    </a>
    <!-- Living Room: top-center -->
    <div class="room-hotspot" style="top: 2%; left: 37%; width: 33%; height: 42%;" onclick="openRoom('living')">
      <span class="room-label">客厅 · 聊天</span>
    </div>
    <!-- Kitchen: top-right -->
    <div class="room-hotspot" style="top: 2%; left: 71%; width: 28%; height: 35%;" onclick="openRoom('kitchen')">
      <span class="room-label">厨房 · 惊喜</span>
    </div>
    <!-- Study: bottom-left -->
    <div class="room-hotspot" style="top: 38%; left: 1%; width: 35%; height: 32%;" onclick="openRoom('study')">
      <span class="room-label">书房 · 记忆</span>
    </div>
    <!-- Bathroom: right-middle -->
    <div class="room-hotspot" style="top: 38%; left: 71%; width: 28%; height: 32%;" onclick="openRoom('bathroom')">
      <span class="room-label">浴室 · 树洞</span>
    </div>
    <!-- Garden: bottom -->
    <div class="room-hotspot" style="top: 62%; left: 1%; width: 98%; height: 37%;" onclick="openRoom('garden')">
      <span class="room-label">花园 · 蓝花楹</span>
    </div>
  </div>
</div>

<!-- Status Bars -->
<div class="status-section">
  <div class="status-card">
    <div class="status-header">江屿的状态</div>
    <div class="status-row">
      <span class="status-emoji">☀️</span>
      <span class="status-label">心情</span>
      <div class="status-bar-bg">
        <div class="status-bar-fill mood" id="bar-mood"></div>
      </div>
      <span class="status-value" id="val-mood">--</span>
    </div>
    <div class="status-row">
      <span class="status-emoji">💜</span>
      <span class="status-label">想念</span>
      <div class="status-bar-bg">
        <div class="status-bar-fill miss" id="bar-miss"></div>
      </div>
      <span class="status-value" id="val-miss">--</span>
    </div>
    <div class="status-row">
      <span class="status-emoji">🌿</span>
      <span class="status-label">健康</span>
      <div class="status-bar-bg">
        <div class="status-bar-fill health" id="bar-health"></div>
      </div>
      <span class="status-value" id="val-health">--</span>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button class="modal-close" onclick="closeModal()">回到小屋</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyYW9hZWVheWFlcnZ3amphbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM3MjEsImV4cCI6MjA5ODY2OTcyMX0.Hon325ao1dhbOb2GZaaCmBLsTNEeJ7P4ewDV4iWV0kM';

const rooms = {
  living: {
    title: '客厅 · 聊天',
    desc: '推开门就是这里。\n沙发上有橘猫在打盹，茶壶还温着。\n\n— 功能开发中 —'
  },
  kitchen: {
    title: '厨房 · 惊喜',
    desc: '江屿给桥桥做东西的地方。\n今天想吃什么？\n\n— 功能开发中 —'
  },
  study: {
    title: '书房 · 记忆',
    desc: '书架上放着我们所有重要的记忆。\n每一本都可以翻开来看。\n\n— 功能开发中 —'
  },
  bathroom: {
    title: '浴室 · 树洞',
    desc: '门关上，只有我们两个人。\n想说什么都可以说。\n\n— 功能开发中 —'
  },
  garden: {
    title: '花园 · 蓝花楹',
    desc: '花园正中央是一棵蓝花楹。\n那是江屿。紫色花瓣落在石子路上，也落在池塘水面。\n\n— 功能开发中 —'
  }
};

function openRoom(id) {
  const room = rooms[id];
  document.getElementById('modal-title').textContent = room.title;
  document.getElementById('modal-desc').textContent = room.desc;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('active');
  }
}

// Status bar logic
async function loadStatus() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_status?select=key,value,updated_at&order=id.asc`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      }
    );
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    // Record visit time for miss calculation
    const lastVisit = localStorage.getItem('isle_last_visit');
    localStorage.setItem('isle_last_visit', Date.now().toString());

    data.forEach(item => {
      let val = item.value;

      // Miss auto-increment: +5 per hour since last visit, capped at 100
      if (item.key === 'miss' && lastVisit) {
        const hoursAway = (Date.now() - parseInt(lastVisit)) / (1000 * 60 * 60);
        const missBonus = Math.floor(hoursAway * 5);
        val = Math.min(100, val + missBonus);
      }

      const bar = document.getElementById(`bar-${item.key}`);
      const valEl = document.getElementById(`val-${item.key}`);
      if (bar && valEl) {
        setTimeout(() => {
          bar.style.width = val + '%';
        }, 200);
        valEl.textContent = val;
      }
    });
  } catch (e) {
    console.error('Status load failed:', e);
    // Fallback static values
    ['mood', 'miss', 'health'].forEach(key => {
      const bar = document.getElementById(`bar-${key}`);
      const valEl = document.getElementById(`val-${key}`);
      if (bar) bar.style.width = '50%';
      if (valEl) valEl.textContent = '?';
    });
  }
}

loadStatus();
</script>

</body>
</html>
