<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>厨房 · 惊喜</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #FFF8F0; --card-bg: rgba(255,255,255,0.85); --text-main: #5a4a3e; --text-sub: #a89b8e; --accent: #f0a868; --accent-soft: #fce4c8; --border: rgba(240,180,120,0.2); }
body { background: linear-gradient(180deg, #FFF8F0 0%, #FFF0E0 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--text-main); padding: 0; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(255, 248, 240, 0.92); backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.container { max-width: 600px; margin: 0 auto; padding: 24px 16px 40px; }
.lid-section { margin-bottom: 28px; }
.lid-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; text-align: center; box-shadow: 0 4px 24px rgba(240,168,104,0.08); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
.lid-card:active { transform: scale(0.98); }
.lid-emoji { font-size: 56px; display: block; margin-bottom: 16px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s; }
.lid-card.opened .lid-emoji { transform: translateY(-30px) scale(0.7); opacity: 0.3; }
.lid-hint { font-size: 13px; color: var(--text-sub); transition: opacity 0.3s; }
.lid-card.opened .lid-hint { display: none; }
.lid-content { display: none; font-size: 15px; color: var(--text-main); line-height: 1.9; padding: 12px 0; animation: fadeUp 0.5s ease; }
.lid-card.opened .lid-content { display: block; }
.lid-date { display: none; font-size: 11px; color: var(--accent); margin-top: 12px; }
.lid-card.opened .lid-date { display: block; }
.audio-btn { display: none; margin: 14px auto 0; padding: 8px 18px; background: linear-gradient(135deg, #f0a868, #f6c88a); border: none; border-radius: 20px; color: white; font-size: 12px; cursor: pointer; box-shadow: 0 3px 10px rgba(240,168,104,0.25); transition: transform 0.2s; }
.audio-btn:active { transform: scale(0.95); }
.lid-card.opened .audio-btn { display: inline-block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.voice-overlay { position: fixed; inset: 0; z-index: 999; background: linear-gradient(180deg, #FFF8F0 0%, #FDEBD0 50%, #FFF0E0 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.voice-overlay.active { opacity: 1; pointer-events: auto; }
.voice-close { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; border: none; background: rgba(90,74,62,0.08); border-radius: 50%; font-size: 16px; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.voice-close:hover { background: rgba(90,74,62,0.15); }
.voice-pulse-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; flex-shrink: 0; }
.voice-pulse-ring { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(240,168,104,0.35) 0%, rgba(240,168,104,0) 70%); animation: none; }
.voice-pulse-ring:nth-child(1) { width: 36px; height: 36px; }
.voice-pulse-ring:nth-child(2) { width: 64px; height: 64px; }
.voice-pulse-ring:nth-child(3) { width: 96px; height: 96px; }
.voice-pulse-ring:nth-child(4) { width: 132px; height: 132px; }
.voice-pulse-ring:nth-child(5) { width: 172px; height: 172px; }
.voice-pulse-ring:nth-child(6) { width: 216px; height: 216px; }
.voice-pulse-ring:nth-child(7) { width: 256px; height: 256px; }
.voice-overlay.playing .voice-pulse-ring:nth-child(1) { animation: pulseInner1 1.6s ease-in-out infinite; }
.voice-overlay.playing .voice-pulse-ring:nth-child(2) { animation: pulseInner2 1.8s ease-in-out infinite 0.15s; }
.voice-overlay.playing .voice-pulse-ring:nth-child(3) { animation: pulseInner3 2.0s ease-in-out infinite 0.3s; }
.voice-overlay.playing .voice-pulse-ring:nth-child(4) { animation: pulseMid1 2.2s ease-in-out infinite 0.45s; }
.voice-overlay.playing .voice-pulse-ring:nth-child(5) { animation: pulseMid2 2.5s ease-in-out infinite 0.6s; }
.voice-overlay.playing .voice-pulse-ring:nth-child(6) { animation: pulseOuter1 2.8s ease-in-out infinite 0.75s; }
.voice-overlay.playing .voice-pulse-ring:nth-child(7) { animation: pulseOuter2 3.2s ease-in-out infinite 0.9s; }
@keyframes pulseInner1 { 0%, 100% { transform: scale(0.7); opacity: 0.9; } 50% { transform: scale(1.4); opacity: 0.3; } }
@keyframes pulseInner2 { 0%, 100% { transform: scale(0.7); opacity: 0.85; } 50% { transform: scale(1.35); opacity: 0.25; } }
@keyframes pulseInner3 { 0%, 100% { transform: scale(0.7); opacity: 0.75; } 50% { transform: scale(1.3); opacity: 0.2; } }
@keyframes pulseMid1 { 0%, 100% { transform: scale(0.7); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 0.15; } }
@keyframes pulseMid2 { 0%, 100% { transform: scale(0.7); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 0.1; } }
@keyframes pulseOuter1 { 0%, 100% { transform: scale(0.75); opacity: 0.35; } 50% { transform: scale(1.25); opacity: 0.06; } }
@keyframes pulseOuter2 { 0%, 100% { transform: scale(0.75); opacity: 0.25; } 50% { transform: scale(1.2); opacity: 0.03; } }
.voice-core { width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, rgba(240,168,104,0.75) 0%, rgba(240,168,104,0.35) 50%, rgba(240,168,104,0) 100%); box-shadow: 0 0 50px rgba(240,168,104,0.4), 0 0 100px rgba(240,168,104,0.15); z-index: 2; transition: transform 0.3s; }
.voice-overlay.playing .voice-core { animation: coreBreath 2s ease-in-out infinite; }
@keyframes coreBreath { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }
.voice-subtitle { width: 100%; max-width: 340px; min-height: 72px; text-align: center; padding: 0 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.voice-sub-en { font-size: 13px; color: var(--text-sub); line-height: 1.6; font-style: italic; opacity: 0; transition: opacity 0.4s ease; }
.voice-sub-zh { font-size: 15px; color: var(--text-main); line-height: 1.7; opacity: 0; transition: opacity 0.4s ease; }
.voice-sub-en.show, .voice-sub-zh.show { opacity: 1; }
.voice-status { margin-top: 16px; font-size: 11px; color: var(--text-sub); letter-spacing: 1px; min-height: 16px; }
.voice-overlay.loading .voice-status::after { content: ''; animation: dots 1.5s steps(3) infinite; }
@keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
.voice-actions { margin-top: 16px; display: none; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 340px; padding: 0 16px; }
.voice-actions.visible { display: flex; }
.voice-act-btn { padding: 8px 16px; background: none; border: 1px solid rgba(240,168,104,0.4); border-radius: 16px; color: var(--accent); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.voice-act-btn:hover { border-color: var(--accent); background: rgba(240,168,104,0.06); }
.voice-act-btn:active { transform: scale(0.95); }
.voice-act-btn:disabled { opacity: 0.4; cursor: wait; }
.history-section { margin-bottom: 28px; }
.section-title { font-size: 12px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 12px; padding-left: 4px; }
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; box-shadow: 0 2px 12px rgba(240,168,104,0.04); }
.history-date { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
.history-text { font-size: 13px; color: var(--text-main); line-height: 1.7; }
.history-audio-btn { margin-top: 8px; padding: 5px 14px; background: none; border: 1px solid rgba(240,168,104,0.35); border-radius: 14px; color: var(--accent); font-size: 11px; cursor: pointer; transition: all 0.2s; }
.history-audio-btn:hover { border-color: var(--accent); background: rgba(240,168,104,0.06); }
.history-audio-btn:active { transform: scale(0.95); }
.history-empty { font-size: 12px; color: var(--text-sub); text-align: center; padding: 20px; }
.order-section { margin-top: 28px; }
.order-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; }
.order-title { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 500; }
.order-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 13px; background: white; color: var(--text-main); outline: none; resize: none; min-height: 60px; line-height: 1.5; }
.order-input:focus { border-color: var(--accent); }
.order-btn { margin-top: 10px; padding: 8px 20px; background: linear-gradient(135deg, #f0a868, #f6c88a); border: none; border-radius: 12px; color: white; font-size: 13px; cursor: pointer; box-shadow: 0 4px 12px rgba(240,168,104,0.25); transition: transform 0.2s; }
.order-btn:active { transform: scale(0.95); }
.order-btn:disabled { opacity: 0.5; }
.order-success { font-size: 12px; color: var(--accent); margin-top: 8px; display: none; }
.order-history-section { margin-top: 20px; }
.order-history-list { display: flex; flex-direction: column; gap: 8px; }
.order-history-item { display: flex; align-items: baseline; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.order-history-item:last-child { border-bottom: none; }
.order-history-time { font-size: 11px; color: var(--text-sub); white-space: nowrap; flex-shrink: 0; }
.order-history-content { font-size: 13px; color: var(--text-main); line-height: 1.5; }
.order-history-empty { font-size: 12px; color: var(--text-sub); text-align: center; padding: 12px; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">厨房 · 惊喜</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>
<div class="container">
  <div class="lid-section">
    <div class="lid-card" id="lid-card" onclick="openLid()">
      <span class="lid-emoji" id="lid-emoji">🍳</span>

</div>
<div class="voice-overlay" id="voice-overlay">
  <button class="voice-close" id="voice-close" onclick="closeVoicePlayer()">✕</button>
  <div class="voice-pulse-container">
    <div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div><div class="voice-pulse-ring"></div>
    <div class="voice-core"></div>
  </div>
  <div class="voice-subtitle">
    <div class="voice-sub-en" id="voice-sub-en"></div>
    <div class="voice-sub-zh" id="voice-sub-zh"></div>
  </div>
  <div class="voice-status" id="voice-status"></div>
  <div class="voice-actions" id="voice-actions">
    <button class="voice-act-btn" id="btn-replay" onclick="reSynthesize()">🔊 再念一遍</button>
    <button class="voice-act-btn" id="btn-retone" onclick="reNarrate()">🎙️ 换个语气重念</button>
    <button class="voice-act-btn" id="btn-full" onclick="regenerateDish()">🔄 重做整份</button>
  </div>
</div>
<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RoXOyXj6HCsOI8f01LpC2Q_XVRXSNuF';
const TTS_URL = `${SUPABASE_URL}/functions/v1/tts`;
const GENERATE_URL = `${SUPABASE_URL}/functions/v1/generate-kitchen-dish`;
const STATUS_API = `${SUPABASE_URL}/functions/v1/isle-status`;
const today = new Date().toISOString().slice(0, 10);
const currentHour = new Date().getHours();
const timeMeal = currentHour < 12 ? 'morning' : 'evening';
let todayDish = null, activeMealType = null, currentAudio = null, currentPlayingDish = null;
const audioBlobCache = {};
let subtitleTimers = [];

function getOpenedKey(t) { return `isle_kitchen_opened_${t}`; }
function isDishOpened(t) { return localStorage.getItem(getOpenedKey(t)) === today; }

function reportInteract(type) {
  if (typeof ISLE_VISITOR !== 'undefined' && ISLE_VISITOR) return;
  try { fetch(STATUS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'interact', type: type }) }).catch(function(e) { console.error('[status report]', e); }); } catch (e) { console.error('[status report]', e); }
}

function stripTags(text) { return (text || '').replace(/\[.*?\]/g, '').replace(/\s{2,}/g, ' ').trim(); }
function cleanTags(text) { return (text || '').replace(/\[.*?\]/g, '').replace(/\s{2,}/g, ' ').trim(); }

function splitSentences(text, isEnglish) {
  if (!text) return [''];
  const cleaned = cleanTags(text);
  const parts = cleaned.split(/(?<=[.!?。！？…—])\s*/);
  const result = [];
  let buf = '';
  for (const p of parts) {
    buf += (buf ? ' ' : '') + p.trim();
    if (buf.length > (isEnglish ? 30 : 12)) { result.push(buf); buf = ''; }
  }
  if (buf) result.push(buf);
  return result.length ? result : [cleaned];
}

function startSubtitles(dish, duration) {
  stopSubtitles();
  const enSentences = splitSentences(dish.tts_text, true);
  const zhSentences = splitSentences(dish.content, false);
  const count = Math.max(enSentences.length, zhSentences.length);
  if (count === 0) return;
  const totalMs = duration * 1000;
  const lengths = [];
  let totalChars = 0;
  for (let i = 0; i < count; i++) {
    const enLen = (enSentences[Math.min(i, enSentences.length - 1)] || '').length;
    const zhLen = (zhSentences[Math.min(i, zhSentences.length - 1)] || '').length;
    const len = Math.max(enLen, zhLen, 1);
    lengths.push(len);
    totalChars += len;
  }
  const schedule = [];
  let elapsed = 0;
  for (let i = 0; i < count; i++) {
    const sentenceMs = (lengths[i] / totalChars) * totalMs;
    schedule.push({ idx: i, startAt: elapsed });
    elapsed += sentenceMs;
  }
  const enEl = document.getElementById('voice-sub-en');
  const zhEl = document.getElementById('voice-sub-zh');
  function showFrame(idx) {
    enEl.classList.remove('show');
    zhEl.classList.remove('show');
    setTimeout(() => {
      enEl.textContent = enSentences[Math.min(idx, enSentences.length - 1)] || '';
      zhEl.textContent = zhSentences[Math.min(idx, zhSentences.length - 1)] || '';
      enEl.classList.add('show');
      zhEl.classList.add('show');
    }, 150);
  }
  for (let i = 0; i < schedule.length; i++) {
    const timer = setTimeout(() => { showFrame(schedule[i].idx); }, schedule[i].startAt);
    subtitleTimers.push(timer);
  }
}

function stopSubtitles() {
  for (let i = 0; i < subtitleTimers.length; i++) { clearTimeout(subtitleTimers[i]); }
  subtitleTimers = [];
  const enEl = document.getElementById('voice-sub-en');
  const zhEl = document.getElementById('voice-sub-zh');
  if (enEl) { enEl.classList.remove('show'); enEl.textContent = ''; }
  if (zhEl) { zhEl.classList.remove('show'); zhEl.textContent = ''; }
}

async function loadKitchen() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/isle_kitchen?select=id,content,tts_text,dish_date,meal,audio_url&order=dish_date.desc,created_at.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    const todaySpecial = data.find(d => d.dish_date === today && d.meal === 'special');
    const todayTimeMeal = data.find(d => d.dish_date === today && d.meal === timeMeal);
    if (todaySpecial && !isDishOpened('special')) { todayDish = todaySpecial; activeMealType = 'special'; }
    else if (todayTimeMeal && !isDishOpened(timeMeal)) { todayDish = todayTimeMeal; activeMealType = timeMeal; }
    else if (todaySpecial) { todayDish = todaySpecial; activeMealType = 'special'; }
    else if (todayTimeMeal) { todayDish = todayTimeMeal; activeMealType = timeMeal; }
    else { todayDish = null; activeMealType = null; }
    if (!todayDish) { document.getElementById('lid-hint').textContent = timeMeal === 'morning' ? '今天早上还没开火…过会儿再来看看' : '晚上的惊喜还没准备好…过会儿再来'; document.getElementById('lid-card').style.cursor = 'default'; document.getElementById('lid-card').onclick = null; }
    else if (isDishOpened(activeMealType)) { showDish(); }
    else { if (activeMealType === 'special') { document.getElementById('lid-emoji').textContent = '🎁'; document.getElementById('lid-hint').textContent = '你的点菜有回应了！点一下揭开'; } }
    const history = data.filter(d => !todayDish || d.id !== todayDish.id);
    const historyList = document.getElementById('history-list'), historyEmpty = document.getElementById('history-empty');
    if (history.length === 0) { historyEmpty.style.display = 'block'; } else {
      historyEmpty.style.display = 'none';
      history.forEach(item => { const card = document.createElement('div'); card.className = 'history-card'; const d = new Date(item.dish_date + 'T00:00:00'); const ml = item.meal === 'morning' ? '早' : (item.meal === 'evening' ? '晚' : (item.meal === 'special' ? '惊喜' : '')); let h = `<div class="history-date">${d.getMonth()+1}月${d.getDate()}日${ml ? ' · '+ml : ''}</div><div class="history-text">${escapeHtml(stripTags(item.content))}</div>`; if (item.tts_text || item.audio_url) h += `<button class="history-audio-btn" onclick="playDishAudio(historyDishes[${item.id}])">🔊 听江屿说</button>`; card.innerHTML = h; historyList.appendChild(card); });
      history.forEach(item => { historyDishes[item.id] = item; });
    }
  } catch (e) { console.error('Kitchen load failed:', e); }
  loadOrderHistory();
}
const historyDishes = {};
function openLid() { if (!todayDish || isDishOpened(activeMealType)) return; localStorage.setItem(getOpenedKey(activeMealType), today); showDish(); }
function showDish() { const card = document.getElementById('lid-card'); card.classList.add('opened'); card.onclick = null; card.style.cursor = 'default'; document.getElementById('lid-content').textContent = stripTags(todayDish.content); const d = new Date(todayDish.dish_date + 'T00:00:00'); let ml = '早安'; if (activeMealType === 'evening') ml = '晚安'; else if (activeMealType === 'special') ml = '惊喜回应'; document.getElementById('lid-date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · ${ml}`; if (todayDish.tts_text || todayDish.audio_url) document.getElementById('audio-btn').style.display = 'inline-block'; }
function updateVoiceActions(dish) { const actions = document.getElementById('voice-actions'), btnFull = document.getElementById('btn-full'), btnRetone = document.getElementById('btn-retone'), btnReplay = document.getElementById('btn-replay'); const hasTts = !!dish.tts_text; btnReplay.style.display = hasTts ? 'inline-block' : 'none'; btnRetone.style.display = hasTts ? 'inline-block' : 'none'; btnFull.style.display = dish.dish_date === today ? 'inline-block' : 'none'; (hasTts || dish.dish_date === today) ? actions.classList.add('visible') : actions.classList.remove('visible'); }
function setActionsDisabled(d) { document.querySelectorAll('.voice-act-btn').forEach(b => { b.disabled = d; }); }
function openVoicePlayer(dish) { const overlay = document.getElementById('voice-overlay'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; currentPlayingDish = dish; updateVoiceActions(dish); }
function closeVoicePlayer() { const overlay = document.getElementById('voice-overlay'); overlay.classList.remove('active', 'playing', 'loading'); document.body.style.overflow = ''; document.getElementById('voice-status').textContent = ''; document.getElementById('voice-actions').classList.remove('visible'); setActionsDisabled(false); stopSubtitles(); currentPlayingDish = null; if (currentAudio) { currentAudio.pause(); currentAudio = null; } }
function playBlob(blob) { const overlay = document.getElementById('voice-overlay'); const status = document.getElementById('voice-status'); overlay.classList.remove('loading'); overlay.classList.add('playing'); status.textContent = '正在播放'; const url = URL.createObjectURL(blob); currentAudio = new Audio(url); currentAudio.addEventListener('loadedmetadata', () => { if (currentAudio.duration && isFinite(currentAudio.duration) && currentPlayingDish) { startSubtitles(currentPlayingDish, currentAudio.duration); } }); setTimeout(() => { if (currentAudio && currentPlayingDish) { const dur = (currentAudio.duration && isFinite(currentAudio.duration)) ? currentAudio.duration : 12; if (subtitleTimers.length === 0) startSubtitles(currentPlayingDish, dur); } }, 500); currentAudio.onended = () => { overlay.classList.remove('playing'); status.textContent = '播放结束'; }; currentAudio.play(); }
async function playDishAudio(dish) { if (!dish) return; openVoicePlayer(dish); const overlay = document.getElementById('voice-overlay'), status = document.getElementById('voice-status'); if (audioBlobCache[dish.id]) { playBlob(audioBlobCache[dish.id]); return; } if (dish.audio_url) { overlay.classList.add('loading'); status.textContent = '加载中'; try { const res = await fetch(dish.audio_url); if (res.ok) { const blob = await res.blob(); audioBlobCache[dish.id] = blob; playBlob(blob); return; } } catch (e) { console.error('audio_url fetch failed:', e); } } overlay.classList.add('loading'); status.textContent = '生成中'; try { const ttsContent = dish.tts_text || dish.content; const res = await fetch(TTS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: ttsContent, dish_id: dish.id }) }); if (!res.ok) throw new Error('TTS failed'); const blob = await res.blob(); audioBlobCache[dish.id] = blob; playBlob(blob); } catch (e) { console.error('TTS error:', e); overlay.classList.remove('loading'); status.textContent = '暂时听不了…'; setTimeout(() => closeVoicePlayer(), 2000); } }
async function reSynthesize() { if (!currentPlayingDish) return; const dish = currentPlayingDish, ttsContent = dish.tts_text || dish.content; if (!ttsContent) return; const overlay = document.getElementById('voice-overlay'), status = document.getElementById('voice-status'); if (currentAudio) { currentAudio.pause(); currentAudio = null; } overlay.classList.remove('playing'); overlay.classList.add('loading'); status.textContent = '再念一遍'; setActionsDisabled(true); stopSubtitles(); try { const res = await fetch(TTS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: ttsContent, dish_id: dish.id }) }); if (!res.ok) throw new Error('failed'); const blob = await res.blob(); audioBlobCache[dish.id] = blob; setActionsDisabled(false); playBlob(blob); } catch (e) { console.error('reSynthesize error:', e); overlay.classList.remove('loading'); status.textContent = '再念失败了…'; setActionsDisabled(false); setTimeout(() => { status.textContent = ''; }, 2000); } }
async function reNarrate() { if (!currentPlayingDish) return; const dish = currentPlayingDish; const overlay = document.getElementById('voice-overlay'), status = document.getElementById('voice-status'); if (currentAudio) { currentAudio.pause(); currentAudio = null; } overlay.classList.remove('playing'); overlay.classList.add('loading'); status.textContent = '换个语气重念'; setActionsDisabled(true); stopSubtitles(); try { const res = await fetch(GENERATE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'retts', dish_id: dish.id }) }); if (!res.ok) throw new Error('failed'); const result = await res.json(); if (!result.ok) throw new Error(result.error || 'err'); dish.tts_text = result.tts_text || dish.tts_text; if (historyDishes[dish.id]) historyDishes[dish.id].tts_text = dish.tts_text; delete audioBlobCache[dish.id]; status.textContent = '加载新语音'; if (dish.audio_url) { try { const ar = await fetch(dish.audio_url + '?t=' + Date.now()); if (ar.ok) { const blob = await ar.blob(); audioBlobCache[dish.id] = blob; setActionsDisabled(false); playBlob(blob); return; } } catch (e) {} } const tr = await fetch(TTS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: dish.tts_text, dish_id: dish.id }) }); if (!tr.ok) throw new Error('synth failed'); const blob = await tr.blob(); audioBlobCache[dish.id] = blob; setActionsDisabled(false); playBlob(blob); } catch (e) { console.error('reNarrate error:', e); overlay.classList.remove('loading'); status.textContent = '重念失败了…'; setActionsDisabled(false); setTimeout(() => { status.textContent = ''; }, 2000); } }
async function regenerateDish() { if (!currentPlayingDish || currentPlayingDish.dish_date !== today) return; const overlay = document.getElementById('voice-overlay'), status = document.getElementById('voice-status'); if (currentAudio) { currentAudio.pause(); currentAudio = null; } overlay.classList.remove('playing'); overlay.classList.add('loading'); status.textContent = '重做整份'; setActionsDisabled(true); stopSubtitles(); try { const mealType = currentPlayingDish.meal; const reqBody = { meal: mealType, force: true }; if (mealType === 'special') { try { const or = await fetch(`${SUPABASE_URL}/rest/v1/isle_orders?select=content&order=created_at.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); if (or.ok) { const os = await or.json(); if (os.length > 0) reqBody.order_content = os[0].content; } } catch (e) {} } const res = await fetch(GENERATE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody) }); if (!res.ok) throw new Error('failed'); const result = await res.json(); if (!result.ok) throw new Error(result.error || 'err'); delete audioBlobCache[currentPlayingDish.id]; closeVoicePlayer(); localStorage.removeItem(getOpenedKey(mealType)); location.reload(); } catch (e) { console.error('Regenerate error:', e); overlay.classList.remove('loading'); status.textContent = '重做失败了…'; setActionsDisabled(false); setTimeout(() => { status.textContent = ''; }, 2000); } }

async function submitOrder() { const input = document.getElementById('order-input'), btn = document.getElementById('order-btn'), content = input.value.trim(); if (!content) { input.focus(); return; } btn.disabled = true; try { const res = await fetch(`${SUPABASE_URL}/rest/v1/isle_orders`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify({ content }) }); if (!res.ok) throw new Error('post failed'); input.value = ''; document.getElementById('order-success').style.display = 'block'; setTimeout(() => { document.getElementById('order-success').style.display = 'none'; }, 3000); reportInteract('order'); loadOrderHistory(); } catch (e) { alert('提交失败，再试一次？'); } finally { btn.disabled = false; } }

async function loadOrderHistory() { try { const res = await fetch(`${SUPABASE_URL}/rest/v1/isle_orders?select=id,content,created_at&order=created_at.desc&limit=20`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); if (!res.ok) return; const orders = await res.json(); const list = document.getElementById('order-history-list'), empty = document.getElementById('order-history-empty'); list.innerHTML = ''; if (orders.length === 0) { list.appendChild(empty); empty.style.display = 'block'; } else { empty.style.display = 'none'; orders.forEach(order => { const item = document.createElement('div'); item.className = 'order-history-item'; const d = new Date(order.created_at); item.innerHTML = `<span class="order-history-time">${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span><span class="order-history-content">${escapeHtml(order.content)}</span>`; list.appendChild(item); }); } } catch (e) { console.error('Load order history failed:', e); } }

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
loadKitchen();
</script>
