<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>厨房 · 惊喜</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFF8F0;
  --card-bg: rgba(255,255,255,0.85);
  --text-main: #5a4a3e;
  --text-sub: #a89b8e;
  --accent: #f0a868;
  --accent-soft: #fce4c8;
  --border: rgba(240,180,120,0.2);
}

body {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFF0E0 100%);
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text-main);
  padding: 0;
  overflow-x: hidden;
}

.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 248, 240, 0.92);
  backdrop-filter: blur(12px);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.container { max-width: 600px; margin: 0 auto; padding: 24px 16px 40px; }

.lid-section { margin-bottom: 28px; }

.lid-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(240,168,104,0.08);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}

.lid-card:active { transform: scale(0.98); }

.lid-emoji {
  font-size: 56px;
  display: block;
  margin-bottom: 16px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s;
}

.lid-card.opened .lid-emoji {
  transform: rotateX(180deg) translateY(-20px);
  opacity: 0.3;
}

.lid-hint { font-size: 13px; color: var(--text-sub); transition: opacity 0.3s; }
.lid-card.opened .lid-hint { display: none; }

.lid-content {
  display: none;
  font-size: 15px;
  color: var(--text-main);
  line-height: 1.9;
  padding: 12px 0;
  animation: fadeUp 0.5s ease;
}

.lid-card.opened .lid-content { display: block; }

.lid-date { display: none; font-size: 11px; color: var(--accent); margin-top: 12px; }
.lid-card.opened .lid-date { display: block; }

.audio-btn {
  display: none;
  margin: 14px auto 0;
  padding: 8px 18px;
  background: linear-gradient(135deg, #f0a868, #f6c88a);
  border: none;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(240,168,104,0.25);
  transition: transform 0.2s;
}

.audio-btn:active { transform: scale(0.95); }
.audio-btn.loading { opacity: 0.6; cursor: wait; }
.lid-card.opened .audio-btn { display: inline-block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Voice Player Overlay ===== */
.voice-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: linear-gradient(180deg, #FFF8F0 0%, #FDEBD0 50%, #FFF0E0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.voice-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.voice-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(90,74,62,0.08);
  border-radius: 50%;
  font-size: 16px;
  color: var(--text-sub);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.voice-close:hover { background: rgba(90,74,62,0.15); }

.voice-pulse-container {
  position: relative;
  width: 300px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 40px;
}

.voice-pulse-ring {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,168,104,0.3) 0%, rgba(240,168,104,0) 70%);
  animation: none;
}

.voice-pulse-ring:nth-child(1) { width: 70px; height: 70px; }
.voice-pulse-ring:nth-child(2) { width: 130px; height: 130px; }
.voice-pulse-ring:nth-child(3) { width: 200px; height: 200px; }
.voice-pulse-ring:nth-child(4) { width: 280px; height: 280px; }

.voice-overlay.playing .voice-pulse-ring:nth-child(1) {
  animation: pulse1 1.8s ease-in-out infinite;
}
.voice-overlay.playing .voice-pulse-ring:nth-child(2) {
  animation: pulse2 2.2s ease-in-out infinite 0.3s;
}
.voice-overlay.playing .voice-pulse-ring:nth-child(3) {
  animation: pulse3 2.6s ease-in-out infinite 0.6s;
}
.voice-overlay.playing .voice-pulse-ring:nth-child(4) {
  animation: pulse4 3s ease-in-out infinite 0.9s;
}

@keyframes pulse1 {
  0%, 100% { transform: scale(0.6); opacity: 0.7; }
  50% { transform: scale(1.3); opacity: 0.15; }
}
@keyframes pulse2 {
  0%, 100% { transform: scale(0.65); opacity: 0.55; }
  50% { transform: scale(1.35); opacity: 0.1; }
}
@keyframes pulse3 {
  0%, 100% { transform: scale(0.7); opacity: 0.4; }
  50% { transform: scale(1.4); opacity: 0.06; }
}
@keyframes pulse4 {
  0%, 100% { transform: scale(0.7); opacity: 0.3; }
  50% { transform: scale(1.4); opacity: 0.03; }
}

.voice-core {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,168,104,0.6) 0%, rgba(240,168,104,0.2) 60%, rgba(240,168,104,0) 100%);
  box-shadow: 0 0 40px rgba(240,168,104,0.3), 0 0 80px rgba(240,168,104,0.1);
  z-index: 2;
  transition: transform 0.3s;
}

.voice-overlay.playing .voice-core {
  animation: coreBreath 2s ease-in-out infinite;
}

@keyframes coreBreath {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.15); opacity: 1; }
}

.voice-text {
  max-width: 300px;
  text-align: center;
  font-size: 14px;
  color: var(--text-main);
  line-height: 1.8;
  opacity: 0.85;
  padding: 0 20px;
}

.voice-status {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-sub);
  letter-spacing: 1px;
}

.voice-overlay.loading .voice-status::after {
  content: '';
  animation: dots 1.5s steps(3) infinite;
}

@keyframes dots {
  0% { content: ''; }
  33% { content: '.'; }
  66% { content: '..'; }
  100% { content: '...'; }
}

/* ===== History & Order ===== */
.history-section { margin-bottom: 28px; }
.section-title { font-size: 12px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 12px; padding-left: 4px; }
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; box-shadow: 0 2px 12px rgba(240,168,104,0.04); }
.history-date { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
.history-text { font-size: 13px; color: var(--text-main); line-height: 1.7; }
.history-audio-btn { margin-top: 8px; padding: 5px 14px; background: none; border: 1px solid rgba(240,168,104,0.35); border-radius: 14px; color: var(--accent); font-size: 11px; cursor: pointer; transition: all 0.2s; }
.history-audio-btn:hover { border-color: var(--accent); background: rgba(240,168,104,0.06); }
.history-audio-btn:active { transform: scale(0.95); }
.history-empty { font-size: 12px; color: var(--text-sub); text-align: center; padding: 20px; }

.order-section { margin-top: 28px; }
.order-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; }
.order-title { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 500; }
.order-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 13px; background: white; color: var(--text-main); outline: none; resize: none; min-height: 60px; line-height: 1.5; }
.order-input:focus { border-color: var(--accent); }
.order-btn { margin-top: 10px; padding: 8px 20px; background: linear-gradient(135deg, #f0a868, #f6c88a); border: none; border-radius: 12px; color: white; font-size: 13px; cursor: pointer; box-shadow: 0 4px 12px rgba(240,168,104,0.25); transition: transform 0.2s; }
.order-btn:active { transform: scale(0.95); }
.order-btn:disabled { opacity: 0.5; }
.order-success { font-size: 12px; color: var(--accent); margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">厨房 · 惊喜</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>

<div class="container">
  <div class="lid-section">
    <div class="lid-card" id="lid-card" onclick="openLid()">
      <span class="lid-emoji" id="lid-emoji">🍳</span>
      <div class="lid-hint" id="lid-hint">点一下揭开今天的锅盖</div>
      <div class="lid-content" id="lid-content"></div>
      <div class="lid-date" id="lid-date"></div>
      <button class="audio-btn" id="audio-btn" onclick="event.stopPropagation(); playDishAudio(todayDish)">🔊 听江屿说</button>
    </div>
  </div>

  <div class="history-section">
    <div class="section-title">往期菜单</div>
    <div class="history-list" id="history-list">
      <div class="history-empty" id="history-empty">还没有往期记录</div>
    </div>
  </div>

  <div class="order-section">
    <div class="order-card">
      <div class="order-title">📝 点菜本</div>
      <textarea class="order-input" id="order-input" placeholder="想吃什么？想看什么？想要什么？写在这里…" maxlength="200"></textarea>
      <button class="order-btn" id="order-btn" onclick="submitOrder()">提交</button>
      <div class="order-success" id="order-success">收到了，我看看怎么做 ❤️</div>
    </div>
  </div>
</div>

<!-- Voice Player Overlay -->
<div class="voice-overlay" id="voice-overlay">
  <button class="voice-close" id="voice-close" onclick="closeVoicePlayer()">✕</button>
  <div class="voice-pulse-container">
    <div class="voice-pulse-ring"></div>
    <div class="voice-pulse-ring"></div>
    <div class="voice-pulse-ring"></div>
    <div class="voice-pulse-ring"></div>
    <div class="voice-core"></div>
  </div>
  <div class="voice-text" id="voice-text"></div>
  <div class="voice-status" id="voice-status"></div>
</div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RoXOyXj6HCsOI8f01LpC2Q_XVRXSNuF';
const TTS_URL = `${SUPABASE_URL}/functions/v1/tts`;

const today = new Date().toISOString().slice(0, 10);
const currentHour = new Date().getHours();
const currentMeal = currentHour < 12 ? 'morning' : 'evening';

let todayDish = null;
let currentAudio = null;
// Cache audio blobs by dish id to avoid re-fetching
const audioBlobCache = {};

const openedKey = `isle_kitchen_opened_${currentMeal}`;
const openedDate = localStorage.getItem(openedKey);

async function loadKitchen() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_kitchen?select=id,content,tts_text,dish_date,meal,audio_url&order=dish_date.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    todayDish = data.find(d => d.dish_date === today && d.meal === currentMeal);
    const history = data.filter(d => !(d.dish_date === today && d.meal === currentMeal));

    if (!todayDish) {
      const hint = currentMeal === 'morning'
        ? '今天早上还没开火…过会儿再来看看'
        : '晚上的惊喜还没准备好…过会儿再来';
      document.getElementById('lid-hint').textContent = hint;
      document.getElementById('lid-card').style.cursor = 'default';
      document.getElementById('lid-card').onclick = null;
    } else if (openedDate === today) {
      showDish();
    }

    const historyList = document.getElementById('history-list');
    const historyEmpty = document.getElementById('history-empty');

    if (history.length === 0) {
      historyEmpty.style.display = 'block';
    } else {
      historyEmpty.style.display = 'none';
      history.forEach(item => {
        const card = document.createElement('div');
        card.className = 'history-card';
        const d = new Date(item.dish_date + 'T00:00:00');
        const mealLabel = item.meal === 'morning' ? '早' : (item.meal === 'evening' ? '晚' : '');
        let html = `
          <div class="history-date">${d.getMonth()+1}月${d.getDate()}日${mealLabel ? ' · ' + mealLabel : ''}</div>
          <div class="history-text">${escapeHtml(item.content)}</div>
        `;
        if (item.tts_text || item.audio_url) {
          html += `<button class="history-audio-btn" onclick="playDishAudio(historyDishes[${item.id}])">🔊 听江屿说</button>`;
        }
        card.innerHTML = html;
        historyList.appendChild(card);
      });
      // Store history dishes by id for onclick access
      history.forEach(item => { historyDishes[item.id] = item; });
    }
  } catch (e) {
    console.error('Kitchen load failed:', e);
  }
}

// Global map for history dish references
const historyDishes = {};

function openLid() {
  if (!todayDish) return;
  if (openedDate === today) return;
  localStorage.setItem(openedKey, today);
  showDish();
}

function showDish() {
  const card = document.getElementById('lid-card');
  card.classList.add('opened');
  card.onclick = null;
  card.style.cursor = 'default';
  document.getElementById('lid-content').textContent = todayDish.content;
  const d = new Date(todayDish.dish_date + 'T00:00:00');
  const mealLabel = currentMeal === 'morning' ? '早安' : '晚安';
  document.getElementById('lid-date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · ${mealLabel}`;
  if (todayDish.tts_text || todayDish.audio_url) {
    document.getElementById('audio-btn').style.display = 'inline-block';
  }
}

function openVoicePlayer(dish) {
  const overlay = document.getElementById('voice-overlay');
  document.getElementById('voice-text').textContent = dish.content;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeVoicePlayer() {
  const overlay = document.getElementById('voice-overlay');
  overlay.classList.remove('active', 'playing', 'loading');
  document.body.style.overflow = '';
  document.getElementById('voice-status').textContent = '';
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
}

async function playDishAudio(dish) {
  if (!dish) return;
  openVoicePlayer(dish);
  const overlay = document.getElementById('voice-overlay');
  const status = document.getElementById('voice-status');

  // Check cache first
  if (audioBlobCache[dish.id]) {
    overlay.classList.add('playing');
    status.textContent = '正在播放';
    const url = URL.createObjectURL(audioBlobCache[dish.id]);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      overlay.classList.remove('playing');
      status.textContent = '播放结束';
    };
    currentAudio.play();
    return;
  }

  // Try existing audio_url
  if (dish.audio_url) {
    overlay.classList.add('loading');
    status.textContent = '加载中';
    try {
      const res = await fetch(dish.audio_url);
      if (res.ok) {
        const blob = await res.blob();
        audioBlobCache[dish.id] = blob;
        overlay.classList.remove('loading');
        overlay.classList.add('playing');
        status.textContent = '正在播放';
        const url = URL.createObjectURL(blob);
        currentAudio = new Audio(url);
        currentAudio.onended = () => {
          overlay.classList.remove('playing');
          status.textContent = '播放结束';
        };
        currentAudio.play();
        return;
      }
    } catch (e) {
      console.error('audio_url fetch failed:', e);
    }
  }

  // Generate via TTS
  overlay.classList.add('loading');
  status.textContent = '生成中';

  try {
    const ttsContent = dish.tts_text || dish.content;
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: ttsContent, dish_id: dish.id })
    });

    if (!res.ok) throw new Error('TTS failed');

    const blob = await res.blob();
    audioBlobCache[dish.id] = blob;
    overlay.classList.remove('loading');
    overlay.classList.add('playing');
    status.textContent = '正在播放';

    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      overlay.classList.remove('playing');
      status.textContent = '播放结束';
    };
    currentAudio.play();
  } catch (e) {
    console.error('TTS error:', e);
    overlay.classList.remove('loading');
    status.textContent = '暂时听不了…';
    setTimeout(() => { closeVoicePlayer(); }, 2000);
  }
}

async function submitOrder() {
  const input = document.getElementById('order-input');
  const btn = document.getElementById('order-btn');
  const content = input.value.trim();
  if (!content) { input.focus(); return; }

  btn.disabled = true;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_orders`,
      {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      }
    );
    if (!res.ok) throw new Error('post failed');
    input.value = '';
    document.getElementById('order-success').style.display = 'block';
    setTimeout(() => { document.getElementById('order-success').style.display = 'none'; }, 3000);
  } catch (e) {
    alert('提交失败，再试一次？');
  } finally {
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadKitchen();
</script>

</body>
</html>
