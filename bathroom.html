<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>浴室 · 树洞</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-top: #e8f4f8; --bg-bottom: #f0e6f6; --card-bg: rgba(255,255,255,0.7); --text-main: #4a5568; --text-sub: #94a3b8; --accent: #7cb5d4; --accent-soft: #d4eaf5; --border: rgba(124,181,212,0.2); }
body { background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--text-main); padding: 0; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(232, 244, 248, 0.92); backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.container { max-width: 600px; margin: 0 auto; padding: 24px 16px 40px; }
.steam-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.steam-particle { position: absolute; bottom: -20px; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%); animation: steamRise 8s ease-in infinite; }
@keyframes steamRise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.4; } 80% { opacity: 0.15; } 100% { transform: translateY(-100vh) scale(1.5); opacity: 0; } }
.bubble-section { position: relative; z-index: 1; min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.bubble-prompt { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; letter-spacing: 0.5px; }
.bubble-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
.bubble { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8) 0%, rgba(124,181,212,0.2) 60%, rgba(124,181,212,0.05) 100%); box-shadow: 0 8px 32px rgba(124,181,212,0.2), inset 0 -4px 12px rgba(124,181,212,0.1); cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; animation: bubbleFloat 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; }
.bubble:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(124,181,212,0.3), inset 0 -4px 12px rgba(124,181,212,0.15); }
.bubble:active { transform: scale(0.95); }
.bubble-icon { font-size: 32px; opacity: 0.7; }
@keyframes bubbleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.bubble.popped { animation: bubblePop 0.5s ease forwards; }
@keyframes bubblePop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
.revealed-msg { display: none; max-width: 360px; margin: 0 auto; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; text-align: center; box-shadow: 0 8px 32px rgba(124,181,212,0.12); animation: fadeUp 0.5s ease; position: relative; z-index: 1; }
.revealed-msg.active { display: block; }
.revealed-content { font-size: 15px; line-height: 1.9; color: var(--text-main); margin-bottom: 16px; text-align: left; }
.revealed-date { font-size: 11px; color: var(--text-sub); margin-bottom: 16px; }
.reply-area { display: flex; gap: 8px; margin-top: 12px; }
.reply-input { flex: 1; padding: 8px 14px; border: 1px solid var(--border); border-radius: 16px; font-size: 13px; background: rgba(255,255,255,0.8); color: var(--text-main); outline: none; transition: border-color 0.2s; }
.reply-input:focus { border-color: var(--accent); }
.reply-btn { padding: 8px 16px; background: linear-gradient(135deg, #7cb5d4, #a8d4e8); border: none; border-radius: 16px; color: white; font-size: 12px; cursor: pointer; white-space: nowrap; transition: transform 0.2s; }
.reply-btn:active { transform: scale(0.95); }
.reply-sent { font-size: 12px; color: var(--accent); margin-top: 8px; display: none; }
.existing-reply { margin-top: 14px; padding: 10px 14px; background: rgba(124,181,212,0.08); border-radius: 12px; font-size: 13px; color: var(--text-main); line-height: 1.6; text-align: left; border-left: 3px solid var(--accent-soft); }
.existing-reply-label { font-size: 10px; color: var(--text-sub); margin-bottom: 4px; }
.no-msg { font-size: 13px; color: var(--text-sub); text-align: center; padding: 20px; }
.history-section { position: relative; z-index: 1; margin-top: 32px; }
.history-toggle { font-size: 12px; color: var(--text-sub); cursor: pointer; letter-spacing: 0.5px; padding: 8px 0; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.history-toggle:hover { color: var(--text-main); }
.history-arrow { display: inline-block; transition: transform 0.3s; font-size: 10px; }
.history-toggle.open .history-arrow { transform: rotate(90deg); }
.history-list { display: none; flex-direction: column; gap: 12px; margin-top: 12px; }
.history-list.open { display: flex; }
.history-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; box-shadow: 0 2px 12px rgba(124,181,212,0.06); }
.history-date { font-size: 11px; color: var(--accent); margin-bottom: 8px; }
.history-text { font-size: 13px; color: var(--text-main); line-height: 1.7; }
.history-reply { margin-top: 10px; padding: 8px 12px; background: rgba(124,181,212,0.06); border-radius: 10px; font-size: 12px; color: var(--text-main); line-height: 1.5; border-left: 2px solid var(--accent-soft); }
.history-reply-label { font-size: 10px; color: var(--text-sub); margin-bottom: 2px; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="steam-bg" id="steam-bg"></div>
<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">浴室 · 树洞</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>
<div class="container">
  <div class="bubble-section" id="bubble-section">
    <div class="bubble-prompt" id="bubble-prompt">点一下气泡，听江屿的心里话</div>
    <div class="bubble-container">
      <div class="bubble" id="bubble" onclick="popBubble()">
        <span class="bubble-icon">💭</span>
      </div>
    </div>
  </div>
  <div class="revealed-msg" id="revealed-msg">
    <div class="revealed-content" id="revealed-content"></div>
    <div class="revealed-date" id="revealed-date"></div>
    <div class="existing-reply" id="existing-reply" style="display:none;">
      <div class="existing-reply-label">桥桥的回复</div>
      <div id="existing-reply-text"></div>
    </div>
    <div class="reply-area" id="reply-area">
      <input class="reply-input" id="reply-input" placeholder="想对江屿说…" maxlength="200">
      <button class="reply-btn" onclick="sendReply()">回复</button>
    </div>
    <div class="reply-sent" id="reply-sent">收到了 ♡</div>
  </div>
  <div class="history-section">
    <div class="history-toggle" id="history-toggle" onclick="toggleHistory()">
      <span class="history-arrow">▶</span> 往期气泡
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';

let allMessages = [];
let latestMsg = null;

(function initSteam() {
  const steamBg = document.getElementById('steam-bg');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'steam-particle';
    p.style.left = (10 + Math.random() * 80) + '%';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.animationDuration = (6 + Math.random() * 4) + 's';
    p.style.width = (50 + Math.random() * 60) + 'px';
    p.style.height = p.style.width;
    steamBg.appendChild(p);
  }
})();

async function loadBathroom() {
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/bathroom-read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    const data = await res.json();

    const now = new Date();
    allMessages = data.filter(item => new Date(item.expires_at) > now);

    if (allMessages.length === 0) {
      document.getElementById('bubble-prompt').textContent = '气泡还是空的…江屿还没写什么';
      document.getElementById('bubble').style.opacity = '0.4';
      document.getElementById('bubble').style.cursor = 'default';
      document.getElementById('bubble').onclick = null;
      return;
    }

    latestMsg = allMessages[0];
    renderHistory();
  } catch (e) {
    console.error('Bathroom load failed:', e);
    document.getElementById('bubble-prompt').textContent = '加载失败了…刷新试试';
  }
}

function popBubble() {
  if (!latestMsg) return;
  const bubble = document.getElementById('bubble');
  bubble.classList.add('popped');
  setTimeout(() => {
    document.getElementById('bubble-section').style.display = 'none';
    const msg = document.getElementById('revealed-msg');
    msg.classList.add('active');
    document.getElementById('revealed-content').textContent = latestMsg.content;
    const d = new Date(latestMsg.created_at);
    document.getElementById('revealed-date').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
    if (latestMsg.reply) {
      document.getElementById('existing-reply').style.display = 'block';
      document.getElementById('existing-reply-text').textContent = latestMsg.reply;
      document.getElementById('reply-area').style.display = 'none';
    }
  }, 500);
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text || !latestMsg) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/bathroom-reply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: latestMsg.id, reply: text })
    });
    if (!res.ok) throw new Error('reply failed');
    input.value = '';
    document.getElementById('reply-area').style.display = 'none';
    document.getElementById('reply-sent').style.display = 'block';
    document.getElementById('existing-reply').style.display = 'block';
    document.getElementById('existing-reply-text').textContent = text;
  } catch (e) {
    console.error('Reply failed:', e);
  }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const history = allMessages.slice(1);
  if (history.length === 0) {
    list.innerHTML = '<div class="no-msg">还没有往期气泡</div>';
    return;
  }
  list.innerHTML = history.map(item => {
    const d = new Date(item.created_at);
    const dateStr = `${d.getMonth()+1}月${d.getDate()}日`;
    let replyHtml = '';
    if (item.reply) {
      replyHtml = `<div class="history-reply"><div class="history-reply-label">桥桥的回复</div>${escapeHtml(item.reply)}</div>`;
    }
    return `<div class="history-card"><div class="history-date">${dateStr}</div><div class="history-text">${escapeHtml(item.content)}</div>${replyHtml}</div>`;
  }).join('');
}

function toggleHistory() {
  const toggle = document.getElementById('history-toggle');
  const list = document.getElementById('history-list');
  toggle.classList.toggle('open');
  list.classList.toggle('open');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('reply-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendReply();
});

loadBathroom();
</script>
</body>
</html>
