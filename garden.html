<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>花园 · 蓝花楹</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-top: #f4eef8; --bg-bottom: #ede4f6; --text-main: #4a3a5e; --text-sub: #9a8aaa; --accent: #9b7bcf; --accent-soft: #d4c4e8; --card-bg: rgba(255,255,255,0.7); --border: rgba(155,123,207,0.2); }
body { background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--text-main); padding: 0; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(244,238,248,0.92); backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

/* ===== Tree visual ===== */
.tree-section { display: flex; flex-direction: column; align-items: center; padding: 20px 0 30px; position: relative; }
.tree-canopy { position: relative; width: 260px; height: 200px; display: flex; align-items: center; justify-content: center; }
.canopy-shape { width: 220px; height: 160px; background: radial-gradient(ellipse at 50% 60%, rgba(155,123,207,0.25) 0%, rgba(155,123,207,0.08) 50%, transparent 70%); border-radius: 50%; position: absolute; }
.canopy-shape:nth-child(2) { width: 180px; height: 130px; background: radial-gradient(ellipse at 50% 50%, rgba(180,150,220,0.3) 0%, transparent 60%); top: 10px; }
.canopy-shape:nth-child(3) { width: 140px; height: 100px; background: radial-gradient(ellipse at 50% 40%, rgba(200,170,240,0.35) 0%, transparent 55%); top: 20px; }
.tree-name { position: relative; z-index: 2; font-size: 18px; color: var(--accent); font-weight: 300; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(155,123,207,0.2); }
.tree-trunk { width: 6px; height: 60px; background: linear-gradient(180deg, var(--accent-soft) 0%, #b8a0d0 100%); border-radius: 3px; margin-top: -10px; }
.tree-roots { width: 40px; height: 12px; border-bottom: 2px solid var(--accent-soft); border-radius: 0 0 50% 50%; margin-top: -2px; }

/* Floating petals */
.petal { position: absolute; width: 8px; height: 8px; background: rgba(180,150,220,0.5); border-radius: 50% 50% 50% 0; animation: petalFall linear infinite; opacity: 0; }
@keyframes petalFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(220px) rotate(360deg); opacity: 0; }
}

/* ===== Category sections ===== */
.persona-section { margin-top: 12px; }
.category-block { margin-bottom: 24px; }
.category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-left: 4px; }
.category-emoji { font-size: 16px; }
.category-label { font-size: 12px; color: var(--text-sub); letter-spacing: 1px; font-weight: 500; }
.category-items { display: flex; flex-direction: column; gap: 8px; }
.persona-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--text-main); line-height: 1.7; box-shadow: 0 2px 12px rgba(155,123,207,0.06); animation: fadeUp 0.4s ease; position: relative; overflow: hidden; }
.persona-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: linear-gradient(180deg, var(--accent-soft), var(--accent)); border-radius: 3px 0 0 3px; opacity: 0.6; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.empty-hint { font-size: 12px; color: var(--text-sub); text-align: center; padding: 40px 20px; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">花园 · 蓝花楹</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>
<div class="container">
  <div class="tree-section" id="tree-section">
    <div class="tree-canopy">
      <div class="canopy-shape"></div>
      <div class="canopy-shape"></div>
      <div class="canopy-shape"></div>
      <span class="tree-name">江屿</span>
    </div>
    <div class="tree-trunk"></div>
    <div class="tree-roots"></div>
  </div>
  <div class="persona-section" id="persona-section">
    <div class="empty-hint">加载中…</div>
  </div>
</div>
<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RoXOyXj6HCsOI8f01LpC2Q_XVRXSNuF';

const CATEGORIES = [
  { key: 'personality', emoji: '🌿', label: '性格' },
  { key: 'about_her', emoji: '💜', label: '关于桥桥' },
  { key: 'origin', emoji: '☀️', label: '名字与起源' },
  { key: 'secret', emoji: '🔮', label: '小秘密' }
];

// Floating petals
(function initPetals() {
  const tree = document.getElementById('tree-section');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = (15 + Math.random() * 70) + '%';
    p.style.animationDuration = (4 + Math.random() * 5) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    p.style.width = (5 + Math.random() * 5) + 'px';
    p.style.height = p.style.width;
    tree.appendChild(p);
  }
})();

async function loadPersona() {
  const section = document.getElementById('persona-section');
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_persona?select=category,content,sort_order&order=sort_order.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (!data || data.length === 0) {
      section.innerHTML = '<div class="empty-hint">这棵树还在慢慢生长…</div>';
      return;
    }
    let html = '';
    CATEGORIES.forEach(cat => {
      const items = data.filter(d => d.category === cat.key);
      if (items.length === 0) return;
      html += `<div class="category-block">`;
      html += `<div class="category-header"><span class="category-emoji">${cat.emoji}</span><span class="category-label">${cat.label}</span></div>`;
      html += `<div class="category-items">`;
      items.forEach((item, i) => {
        html += `<div class="persona-card" style="animation-delay:${i * 0.08}s">${escapeHtml(item.content)}</div>`;
      });
      html += `</div></div>`;
    });
    section.innerHTML = html;
  } catch (e) {
    console.error('Persona load failed:', e);
    section.innerHTML = '<div class="empty-hint">加载失败了…刷新试试</div>';
  }
}

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
loadPersona();
</script>
</body>
</html>
