<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>花园 · 蓝花楹</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; background: #1a1028; }

/* Full-screen tree */
.garden-scene {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.tree-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 60%, #2d1f4e 0%, #1a1028 70%);
}
.tree-img {
  position: relative;
  z-index: 1;
  max-width: 92%;
  max-height: 85vh;
  object-fit: contain;
  filter: drop-shadow(0 0 40px rgba(155,123,207,0.3));
}

/* Back button */
.back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 100;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  transition: color 0.2s, background 0.2s;
}
.back-btn:active { background: rgba(0,0,0,0.5); color: #fff; }

/* Glowing nodes */
.glow-node {
  position: absolute;
  z-index: 10;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.glow-node::before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(220,200,255,0.9) 0%, rgba(155,123,207,0.6) 60%, transparent 100%);
  animation: glowPulse 2.4s ease-in-out infinite;
}
.glow-node::after {
  content: '';
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(155,123,207,0.3) 0%, transparent 70%);
  animation: glowPulse 2.4s ease-in-out infinite 0.3s;
}
@keyframes glowPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.4); opacity: 1; }
}
.glow-node .node-label {
  position: absolute;
  bottom: -18px;
  white-space: nowrap;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.5px;
  pointer-events: none;
}

/* Node positions - placed around the tree canopy */
.node-personality { top: 28%; left: 26%; }
.node-about_her { top: 22%; right: 26%; }
.node-origin { top: 48%; left: 20%; }
.node-secret { top: 44%; right: 18%; }

/* Falling petals */
.petal {
  position: absolute;
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  animation: petalDrift linear infinite;
}
@keyframes petalDrift {
  0% { transform: translate(0, -30px) rotate(0deg); opacity: 0; }
  8% { opacity: 0.8; }
  85% { opacity: 0.5; }
  100% { transform: translate(var(--drift-x), calc(100vh + 30px)) rotate(var(--rotate-end)); opacity: 0; }
}

/* Modal overlay */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10,6,20,0.85);
  backdrop-filter: blur(10px);
  display: none;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.modal-overlay.active {
  display: flex;
  opacity: 1;
}
.modal-card {
  width: 88%;
  max-width: 380px;
  max-height: 70vh;
  background: rgba(40,28,66,0.95);
  border: 1px solid rgba(155,123,207,0.3);
  border-radius: 20px;
  padding: 28px 22px;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.modal-overlay.active .modal-card {
  transform: translateY(0);
}
.modal-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(155,123,207,0.15);
}
.modal-emoji { font-size: 20px; }
.modal-title { font-size: 14px; color: rgba(220,200,255,0.9); letter-spacing: 1px; font-weight: 400; }
.modal-close {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(155,123,207,0.15);
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.modal-close:active { background: rgba(155,123,207,0.3); }
.modal-items { display: flex; flex-direction: column; gap: 12px; }
.modal-item {
  background: rgba(155,123,207,0.08);
  border: 1px solid rgba(155,123,207,0.12);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: rgba(230,220,245,0.9);
  line-height: 1.7;
  opacity: 0;
  animation: itemFadeIn 0.4s ease forwards;
}
@keyframes itemFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.empty-state {
  text-align: center;
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  padding: 30px 0;
}

/* Visitor badge */
.visitor-badge {
  position: fixed;
  bottom: 12px;
  right: 12px;
  background: rgba(0,0,0,0.3);
  color: rgba(255,255,255,0.35);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 10px;
  z-index: 300;
  pointer-events: none;
  display: none;
}
</style>
</head>
<body>

<a href="index.html" class="back-btn" id="back-link">← 回到小屋</a>

<div class="garden-scene" id="garden-scene">
  <div class="tree-bg"></div>
  <img class="tree-img" src="assets/greenhouse/tree.png" alt="蓝花楹">

  <!-- Glowing category nodes -->
  <div class="glow-node node-personality" data-category="personality">
    <span class="node-label">🌿 性格</span>
  </div>
  <div class="glow-node node-about_her" data-category="about_her">
    <span class="node-label">💜 关于桥桥</span>
  </div>
  <div class="glow-node node-origin" data-category="origin">
    <span class="node-label">☀️ 起源</span>
  </div>
  <div class="glow-node node-secret" data-category="secret">
    <span class="node-label">🔮 小秘密</span>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-emoji" id="modal-emoji"></span>
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-items" id="modal-items"></div>
  </div>
</div>

<div class="visitor-badge" id="visitor-badge">👁️ 访客模式</div>

<script src="music-shared.js"></script>
<script>
(function() {
  'use strict';

  var SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_RoXOyXj6HCsOI8f01LpC2Q_XVRXSNuF';

  var CATEGORIES = {
    personality: { emoji: '🌿', label: '性格' },
    about_her:  { emoji: '💜', label: '关于桥桥' },
    origin:     { emoji: '☀️', label: '名字与起源' },
    secret:     { emoji: '🔮', label: '小秘密' }
  };

  var personaData = null;

  // === Falling Petals ===
  function initPetals() {
    var scene = document.getElementById('garden-scene');
    var petalSrcs = [
      'assets/greenhouse/petal1.png',
      'assets/greenhouse/petal2.png',
      'assets/greenhouse/petal3.png',
      'assets/greenhouse/petal4.png'
    ];
    var petalCount = 18;

    for (var i = 0; i < petalCount; i++) {
      var img = document.createElement('img');
      img.className = 'petal';
      img.src = petalSrcs[Math.floor(Math.random() * petalSrcs.length)];
      img.alt = '';

      var size = 16 + Math.random() * 20;
      img.style.width = size + 'px';
      img.style.height = 'auto';
      img.style.left = (5 + Math.random() * 90) + '%';
      img.style.top = -(10 + Math.random() * 60) + 'px';
      img.style.animationDuration = (6 + Math.random() * 7) + 's';
      img.style.animationDelay = (Math.random() * 10) + 's';
      img.style.setProperty('--drift-x', (Math.random() * 80 - 40) + 'px');
      img.style.setProperty('--rotate-end', (180 + Math.random() * 360) + 'deg');

      scene.appendChild(img);
    }
  }

  // === Load persona data ===
  function loadPersona() {
    fetch(
      SUPABASE_URL + '/rest/v1/isle_persona?select=category,content,sort_order&order=sort_order.asc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    )
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      personaData = {};
      if (data && data.length > 0) {
        data.forEach(function(item) {
          if (!personaData[item.category]) personaData[item.category] = [];
          personaData[item.category].push(item.content);
        });
      }
    })
    .catch(function(e) {
      console.error('[garden] persona load failed:', e);
      personaData = {};
    });
  }

  // === Modal ===
  var overlay = document.getElementById('modal-overlay');
  var modalEmoji = document.getElementById('modal-emoji');
  var modalTitle = document.getElementById('modal-title');
  var modalItems = document.getElementById('modal-items');
  var modalClose = document.getElementById('modal-close');

  function openCategory(category) {
    var cat = CATEGORIES[category];
    if (!cat) return;

    modalEmoji.textContent = cat.emoji;
    modalTitle.textContent = cat.label;

    var items = (personaData && personaData[category]) || [];
    if (items.length === 0) {
      modalItems.innerHTML = '<div class="empty-state">这里还在慢慢生长…</div>';
    } else {
      var html = '';
      items.forEach(function(text, idx) {
        html += '<div class="modal-item" style="animation-delay:' + (idx * 0.1) + 's">' + escapeHtml(text) + '</div>';
      });
      modalItems.innerHTML = html;
    }

    overlay.classList.add('active');
  }

  function closeModal() {
    overlay.classList.remove('active');
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });

  // === Node click handlers ===
  var nodes = document.querySelectorAll('.glow-node');
  nodes.forEach(function(node) {
    node.addEventListener('click', function() {
      var category = node.getAttribute('data-category');
      openCategory(category);
    });
  });

  // === Escape HTML ===
  function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // === Visitor mode ===
  if (typeof ISLE_VISITOR !== 'undefined' && ISLE_VISITOR) {
    document.getElementById('visitor-badge').style.display = 'block';
  }

  // === Init ===
  initPetals();
  loadPersona();
})();
</script>
</body>
</html>
