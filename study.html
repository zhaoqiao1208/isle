<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>书房 · 记录</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFF8F0;
  --card-bg: rgba(255,255,255,0.85);
  --text-main: #5a4a3e;
  --text-sub: #a89b8e;
  --accent: #f0a868;
  --accent-soft: #fce4c8;
  --border: rgba(240,180,120,0.2);
}

body {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFF0E0 100%);
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text-main);
  padding: 0;
  overflow-x: hidden;
}

.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 248, 240, 0.92);
  backdrop-filter: blur(12px);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.container { max-width: 600px; margin: 0 auto; padding: 24px 16px 40px; }

/* ===== Desk Section ===== */
.desk-section { margin-bottom: 32px; }
.section-title {
  font-size: 12px;
  color: var(--text-sub);
  letter-spacing: 1px;
  margin-bottom: 14px;
  padding-left: 4px;
}

.notebook {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(240,168,104,0.06);
}

.notebook-title {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 14px;
  font-weight: 500;
}

.note-tags {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.note-tag {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-sub);
  transition: all 0.2s;
}

.note-tag.active {
  background: linear-gradient(135deg, #f0a868, #f6c88a);
  color: white;
  border-color: transparent;
}

.note-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.note-item {
  padding: 10px 14px;
  background: rgba(252,228,200,0.3);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.6;
  animation: fadeUp 0.3s ease;
}

.note-item::before {
  content: '· ';
  color: var(--accent);
  font-weight: bold;
}

.note-empty {
  font-size: 12px;
  color: var(--text-sub);
  text-align: center;
  padding: 16px;
}

/* ===== Memo Section ===== */
.memo-section { margin-bottom: 32px; }

.memo-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  box-shadow: 0 4px 20px rgba(240,168,104,0.06);
}

.memo-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.memo-item {
  padding: 10px 14px;
  background: rgba(252,228,200,0.2);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.6;
  border-left: 3px solid var(--accent-soft);
}

.memo-date {
  font-size: 10px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* ===== Bookshelf Section ===== */
.shelf-section { margin-bottom: 28px; }

.shelf-label {
  font-size: 11px;
  color: var(--text-sub);
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-left: 6px;
}

.bookshelf {
  background: linear-gradient(180deg, rgba(139,109,82,0.08) 0%, rgba(139,109,82,0.03) 100%);
  border-radius: 16px;
  padding: 20px 16px;
  min-height: 140px;
  margin-bottom: 16px;
}

.shelf-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  padding-bottom: 12px;
  border-bottom: 3px solid rgba(139,109,82,0.15);
  margin-bottom: 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.shelf-row::-webkit-scrollbar { display: none; }
.shelf-row:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

.book-spine {
  min-width: 36px;
  max-width: 44px;
  height: 120px;
  border-radius: 3px 6px 6px 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 10px;
  color: white;
  padding: 8px 4px;
  cursor: pointer;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.1), inset -1px 0 2px rgba(255,255,255,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  flex-shrink: 0;
  letter-spacing: 1px;
  font-weight: 500;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.book-spine:hover {
  transform: translateY(-4px);
  box-shadow: 2px 4px 12px rgba(0,0,0,0.15), inset -1px 0 2px rgba(255,255,255,0.2);
}

.book-spine:active { transform: translateY(-2px); }

/* Book detail overlay */
.book-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(90,74,62,0.4);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.book-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.book-detail {
  background: var(--bg);
  border-radius: 20px;
  padding: 28px 24px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  animation: fadeUp 0.3s ease;
}

.book-detail-title {
  font-size: 16px;
  color: var(--text-main);
  margin-bottom: 6px;
  font-weight: 500;
}

.book-detail-type {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 14px;
}

.book-detail-note {
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.8;
  opacity: 0.85;
}

.book-detail-close {
  margin-top: 18px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #f0a868, #f6c88a);
  border: none;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  cursor: pointer;
}

.shelf-empty {
  font-size: 12px;
  color: var(--text-sub);
  text-align: center;
  padding: 30px 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">书房 · 记录</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>

<div class="container">
  <!-- Desk: Notes -->
  <div class="desk-section">
    <div class="section-title">桌面笔记</div>
    <div class="notebook">
      <div class="notebook-title">📒 江屿的观察手记</div>
      <div class="note-tags" id="note-tags">
        <span class="note-tag active" data-cat="like">喜欢</span>
        <span class="note-tag" data-cat="dislike">讨厌</span>
        <span class="note-tag" data-cat="habit">小癖好</span>
      </div>
      <div class="note-list" id="note-list">
        <div class="note-empty">加载中…</div>
      </div>
    </div>
  </div>

  <!-- Desk: Memos -->
  <div class="memo-section">
    <div class="section-title">碎片日志</div>
    <div class="memo-card">
      <div class="memo-list" id="memo-list">
        <div class="note-empty">还没有碎片记录</div>
      </div>
    </div>
  </div>

  <!-- Bookshelf: Books -->
  <div class="shelf-section">
    <div class="section-title">书架</div>
    <div class="shelf-label">📖 书</div>
    <div class="bookshelf" id="bookshelf-books">
      <div class="shelf-empty">还没有书…</div>
    </div>
    <div class="shelf-label">🎬 影碟</div>
    <div class="bookshelf" id="bookshelf-movies">
      <div class="shelf-empty">还没有影碟…</div>
    </div>
  </div>
</div>

<!-- Book detail overlay -->
<div class="book-overlay" id="book-overlay" onclick="closeBook()">
  <div class="book-detail" onclick="event.stopPropagation()">
    <div class="book-detail-title" id="book-title"></div>
    <div class="book-detail-type" id="book-type"></div>
    <div class="book-detail-note" id="book-note"></div>
    <button class="book-detail-close" onclick="closeBook()">关上</button>
  </div>
</div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyYW9hZWVheWFlcnZ3amphbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM3MjEsImV4cCI6MjA5ODY2OTcyMX0.Hon325ao1dhbOb2GZaaCmBLsTNEeJ7P4ewDV4iWV0kM';

let allNotes = [];
let allBooks = [];
let currentCat = 'like';

async function loadStudy() {
  await Promise.all([loadNotes(), loadBooks()]);
}

async function loadNotes() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_study_notes?select=id,category,content,created_at&order=created_at.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    allNotes = await res.json();
    renderNotes();
    renderMemos();
  } catch (e) {
    console.error('Notes load failed:', e);
  }
}

function renderNotes() {
  const list = document.getElementById('note-list');
  const notes = allNotes.filter(n => n.category === currentCat);
  if (notes.length === 0) {
    list.innerHTML = '<div class="note-empty">这里还是空的…</div>';
    return;
  }
  list.innerHTML = notes.map(n =>
    `<div class="note-item">${escapeHtml(n.content)}</div>`
  ).join('');
}

function renderMemos() {
  const list = document.getElementById('memo-list');
  const memos = allNotes.filter(n => n.category === 'memo');
  if (memos.length === 0) {
    list.innerHTML = '<div class="note-empty">还没有碎片记录</div>';
    return;
  }
  list.innerHTML = memos.map(n => {
    const d = new Date(n.created_at);
    const dateStr = `${d.getMonth()+1}月${d.getDate()}日`;
    return `<div class="memo-item">${escapeHtml(n.content)}<div class="memo-date">${dateStr}</div></div>`;
  }).join('');
}

async function loadBooks() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_bookshelf?select=id,title,type,color,note,created_at&order=created_at.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    allBooks = await res.json();
    renderShelf();
  } catch (e) {
    console.error('Books load failed:', e);
  }
}

function renderShelf() {
  const books = allBooks.filter(b => b.type === 'book');
  const movies = allBooks.filter(b => b.type !== 'book');

  renderShelfSection('bookshelf-books', books);
  renderShelfSection('bookshelf-movies', movies);
}

function renderShelfSection(containerId, items) {
  const container = document.getElementById(containerId);
  if (items.length === 0) {
    container.innerHTML = '<div class="shelf-empty">空的…</div>';
    return;
  }

  const rows = [];
  for (let i = 0; i < items.length; i += 7) {
    rows.push(items.slice(i, i + 7));
  }

  container.innerHTML = rows.map(row =>
    `<div class="shelf-row">${row.map(book =>
      `<div class="book-spine" style="background:${book.color}" onclick="openBook(${book.id})">${escapeHtml(book.title)}</div>`
    ).join('')}</div>`
  ).join('');
}

function openBook(id) {
  const book = allBooks.find(b => b.id === id);
  if (!book) return;
  const typeMap = { book: '📖 书', anime: '🎬 番剧', movie: '🎥 电影', drama: '📺 剧', game: '🎮 游戏' };
  document.getElementById('book-title').textContent = book.title;
  document.getElementById('book-type').textContent = typeMap[book.type] || book.type;
  document.getElementById('book-note').textContent = book.note || '还没有写感受';
  document.getElementById('book-overlay').classList.add('active');
}

function closeBook() {
  document.getElementById('book-overlay').classList.remove('active');
}

// Tag switching
document.getElementById('note-tags').addEventListener('click', (e) => {
  const tag = e.target.closest('.note-tag');
  if (!tag) return;
  document.querySelectorAll('.note-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  currentCat = tag.dataset.cat;
  renderNotes();
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadStudy();
</script>

</body>
</html>
