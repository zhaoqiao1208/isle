<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>卧室</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FDF8F3; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(253, 248, 243, 0.92); backdrop-filter: blur(10px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0e6dc; }
.back-btn { font-size: 14px; color: #9a8b7e; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.header-title { font-size: 15px; color: #5a4a3e; letter-spacing: 1px; font-weight: normal; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* Top section: diary entry */
.diary-section { padding: 20px 16px; display: flex; justify-content: center; }
.diary-card { background: #FFFBF7; border: 1px solid #f0e6dc; border-radius: 14px; padding: 18px 22px; width: 100%; max-width: 400px; cursor: pointer; transition: background 0.3s, transform 0.2s, box-shadow 0.3s; text-align: center; box-shadow: 0 2px 12px rgba(120,80,60,0.04); }
.diary-card:active { background: #faf3ec; transform: scale(0.97); box-shadow: 0 4px 16px rgba(120,80,60,0.08); }
.diary-card-icon { font-size: 22px; margin-bottom: 8px; }
.diary-card-title { font-size: 14px; color: #5a4a3e; letter-spacing: 0.5px; }
.diary-card-sub { font-size: 11px; color: #9a8b7e; margin-top: 6px; }

/* Middle section: scene with hotspots */
.scene-section { position: relative; width: 100%; }
.scene-bg { width: 100%; display: block; }
.hotspot { position: absolute; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
.hotspot:active { background: rgba(201,168,232,0.15); }
.hotspot-bed { top: 30%; left: 18%; width: 52%; height: 50%; }
.hotspot-wardrobe { top: 8%; right: 2%; width: 26%; height: 72%; }
.hotspot-desk { bottom: 4%; right: 2%; width: 24%; height: 34%; }
.hotspot-window { top: 5%; left: 2%; width: 22%; height: 60%; }

/* Tap ripple effect */
.ripple { position: absolute; border-radius: 50%; background: rgba(201,168,232,0.3); pointer-events: none; animation: rippleAnim 0.6s ease-out forwards; }
@keyframes rippleAnim { 0%{width:0;height:0;opacity:1} 100%{width:60px;height:60px;opacity:0} }

/* Bottom section: bubble left-center, character right */
.character-section { padding: 0 16px 30px; display: flex; align-items: flex-start; justify-content: flex-end; gap: 10px; min-height: 200px; position: relative; }
.character-img { width: 160px; height: auto; image-rendering: pixelated; filter: drop-shadow(0 4px 16px rgba(120,80,60,0.15)); cursor: pointer; transition: transform 0.15s ease; flex-shrink: 0; margin-top: -20px; animation: breathe 3.5s ease-in-out infinite; }
.character-img:active { transform: scale(0.93); animation: none; }
.character-img.bounce { animation: charBounce 0.4s ease forwards; }
@keyframes breathe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes charBounce { 0%{transform:translateY(0)} 30%{transform:translateY(-8px)} 60%{transform:translateY(2px)} 100%{transform:translateY(0)} }

.speech-bubble { flex: 1; min-height: 120px; max-width: 210px; background: #f8f0fa; color: #5a4a5e; font-size: 14px; line-height: 1.8; padding: 18px 20px; border-radius: 18px 18px 4px 18px; box-shadow: 0 2px 12px rgba(160,120,180,0.08); border: 1px solid #ece0f0; opacity: 0; transform: translateY(6px); transition: opacity 0.4s ease, transform 0.4s ease; display: flex; align-items: center; justify-content: center; text-align: center; margin-top: 40px; margin-right: -6px; }
.speech-bubble.show { opacity: 1; transform: translateY(0); }

/* Miss indicator */
.miss-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(201,168,232,0.9); color: #fff; font-size: 12px; padding: 6px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: 40; }
.miss-indicator.show { opacity: 1; }

/* Visitor */
.visitor-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FDF8F3; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.visitor-block-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.6; }
.visitor-block-text { font-size: 14px; color: #9a8b7e; line-height: 1.8; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 小屋</a>
  <span class="header-title">卧室</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>

<div class="visitor-block" id="visitor-block" style="display:none;">
  <div class="visitor-block-icon">🔒</div>
  <div class="visitor-block-text">这里是只属于我们的私密空间<br>访客无法进入哦</div>
</div>

<div id="main-content">
  <!-- Top: diary entry -->
  <div class="diary-section">
    <div class="diary-card" id="diary-card" onclick="location.href='diary.html'">
      <div class="diary-card-icon">📖</div>
      <div class="diary-card-title">江屿的日记</div>
      <div class="diary-card-sub">点击翻阅</div>
    </div>
  </div>

  <!-- Middle: scene -->
  <div class="scene-section" id="scene-section">
    <img class="scene-bg" src="assets/bedroom/bedroom-bg.webp" alt="卧室">
    <div class="hotspot hotspot-bed" data-zone="bed"></div>
    <div class="hotspot hotspot-wardrobe" data-zone="wardrobe"></div>
    <div class="hotspot hotspot-desk" data-zone="desk"></div>
    <div class="hotspot hotspot-window" data-zone="window"></div>
  </div>

  <!-- Bottom: bubble left, character right -->
  <div class="character-section">
    <div class="speech-bubble" id="speech-bubble"></div>
    <img class="character-img" id="character" src="assets/bedroom/jiangyu.png" alt="江屿">
  </div>
</div>

<div class="miss-indicator" id="miss-indicator"></div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script src="visitor.js"></script>
<script>

var SPOKEN_KEY = 'bedroom_spoken';

function getSpoken() {
  try {
    var raw = localStorage.getItem(SPOKEN_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function markSpoken(zone, idx) {
  try {
    var spoken = getSpoken();
    if (!spoken[zone]) spoken[zone] = [];
    if (spoken[zone].indexOf(idx) === -1) spoken[zone].push(idx);
    localStorage.setItem(SPOKEN_KEY, JSON.stringify(spoken));
  } catch(e) {}
}

function pickDialogue(zone) {
  var pool = ZONE_DIALOGUES[zone];
  if (!pool) return { text: '你来啦。', zone: zone, idx: 0 };
  var spoken = getSpoken();
  var used = spoken[zone] || [];
  var available = [];
  for (var i = 0; i < pool.length; i++) {
    if (used.indexOf(i) === -1) available.push(i);
  }
  if (available.length === 0) {
    available = [];
    for (var j = 0; j < pool.length; j++) available.push(j);
    spoken[zone] = [];
    try { localStorage.setItem(SPOKEN_KEY, JSON.stringify(spoken)); } catch(e) {}
  }
  var pick = available[Math.floor(Math.random() * available.length)];
  return { text: pool[pick], zone: zone, idx: pick };
}

var bubbleTimer = null;

if (ISLE_VISITOR) {
  document.getElementById('visitor-block').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
} else {
  initBedroom();
}

function initBedroom() {
  var hotspots = document.querySelectorAll('.hotspot');
  hotspots.forEach(function(el) {
    el.addEventListener('click', function(e) {
      var zone = el.getAttribute('data-zone');
      showDialogue(zone);
      showRipple(e, el);
      tapReduceMiss();
    });
  });

  var character = document.getElementById('character');
  character.addEventListener('click', function() {
    var zones = ['bed', 'wardrobe', 'desk', 'window'];
    var z = zones[Math.floor(Math.random() * zones.length)];
    showDialogue(z);
    tapReduceMiss();
  });
}

function showRipple(e, parent) {
  var rect = parent.getBoundingClientRect();
  var ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (e.clientX - rect.left - 30) + 'px';
  ripple.style.top = (e.clientY - rect.top - 30) + 'px';
  parent.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 600);
}

function showDialogue(zone) {
  var result = pickDialogue(zone);
  markSpoken(result.zone, result.idx);

  var character = document.getElementById('character');
  var bubble = document.getElementById('speech-bubble');

  character.classList.remove('bounce');
  character.style.animation = 'none';
  void character.offsetWidth;
  character.classList.add('bounce');
  setTimeout(function() {
    character.classList.remove('bounce');
    character.style.animation = '';
  }, 450);

  bubble.textContent = result.text;
  bubble.classList.add('show');

  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(function() {
    bubble.classList.remove('show');
  }, 6000);
}

function tapReduceMiss() {
  try {
    fetch(STATUS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'bedroom_tap' })
    }).then(function(r) {
      if (!r.ok) return;
      return r.json();
    }).then(function(data) {
      if (!data) return;
      var indicator = document.getElementById('miss-indicator');
      if (data.applied) {
        indicator.textContent = '想念 -1 (' + data.taps_remaining + ' 次剩余)';
      } else {
        indicator.textContent = '这会儿摸够啦，晚点再来~';
      }
      indicator.classList.add('show');
      setTimeout(function() { indicator.classList.remove('show'); }, 2200);
    }).catch(function(e) {
      console.error('[bedroom] tap miss error:', e);
    });
  } catch (e) {
    console.error('[bedroom] tap error:', e);
  }
}
</script>
</body>
</html>
