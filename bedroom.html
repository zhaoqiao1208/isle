<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>卧室</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1520; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(26, 21, 32, 0.92); backdrop-filter: blur(10px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(200,170,230,0.15); }
.back-btn { font-size: 14px; color: #c9a8e8; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.header-title { font-size: 15px; color: #e8dff5; letter-spacing: 1px; font-weight: normal; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* Top section: diary entry */
.diary-section { padding: 20px 16px; display: flex; justify-content: center; }
.diary-card { background: rgba(255,252,248,0.06); border: 1px solid rgba(200,170,230,0.2); border-radius: 14px; padding: 18px 22px; width: 100%; max-width: 400px; cursor: pointer; transition: background 0.3s, transform 0.2s; text-align: center; }
.diary-card:active { background: rgba(200,170,230,0.1); transform: scale(0.97); }
.diary-card-icon { font-size: 22px; margin-bottom: 8px; }
.diary-card-title { font-size: 14px; color: #e8dff5; letter-spacing: 0.5px; }
.diary-card-sub { font-size: 11px; color: #9a8aaa; margin-top: 6px; }

/* Middle section: scene with hotspots */
.scene-section { position: relative; width: 100%; }
.scene-bg { width: 100%; display: block; }
.hotspot { position: absolute; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
.hotspot:active { background: rgba(255,255,255,0.12); }
.hotspot-bed { top: 30%; left: 18%; width: 52%; height: 50%; }
.hotspot-wardrobe { top: 8%; right: 2%; width: 26%; height: 72%; }
.hotspot-desk { bottom: 4%; right: 2%; width: 24%; height: 34%; }
.hotspot-window { top: 5%; left: 2%; width: 22%; height: 60%; }

/* Tap ripple effect */
.ripple { position: absolute; border-radius: 50%; background: rgba(201,168,232,0.35); pointer-events: none; animation: rippleAnim 0.6s ease-out forwards; }
@keyframes rippleAnim { 0%{width:0;height:0;opacity:1} 100%{width:60px;height:60px;opacity:0} }

/* Bottom section: character + dialogue */
.character-section { padding: 24px 16px 40px; display: flex; flex-direction: column; align-items: center; min-height: 220px; }
.character-img { width: 90px; height: auto; image-rendering: pixelated; filter: drop-shadow(0 4px 16px rgba(180,140,220,0.4)); cursor: pointer; transition: transform 0.15s ease; }
.character-img:active { transform: scale(0.93); }
.character-img.bounce { animation: charBounce 0.4s ease; }
@keyframes charBounce { 0%{transform:translateY(0)} 30%{transform:translateY(-8px)} 60%{transform:translateY(2px)} 100%{transform:translateY(0)} }

.speech-bubble { margin-top: 16px; max-width: 260px; background: rgba(255,252,248,0.95); color: #5a4a6e; font-size: 13px; line-height: 1.7; padding: 12px 18px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); opacity: 0; transform: translateY(6px); transition: opacity 0.3s ease, transform 0.3s ease; text-align: center; }
.speech-bubble.show { opacity: 1; transform: translateY(0); }

/* Miss indicator */
.miss-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(201,168,232,0.9); color: #fff; font-size: 12px; padding: 6px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: 40; }
.miss-indicator.show { opacity: 1; }

/* Visitor */
.visitor-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1520; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.visitor-block-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.6; }
.visitor-block-text { font-size: 14px; color: #9a8aaa; line-height: 1.8; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 小屋</a>
  <span class="header-title">卧室</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>

<div class="visitor-block" id="visitor-block" style="display:none;">
  <div class="visitor-block-icon">🔒</div>
  <div class="visitor-block-text">这里是只属于我们的私密空间<br>访客无法进入哦</div>
</div>

<div id="main-content">
  <!-- Top: diary entry -->
  <div class="diary-section">
    <div class="diary-card" id="diary-card" onclick="location.href='diary.html'">
      <div class="diary-card-icon">📖</div>
      <div class="diary-card-title">江屿的日记</div>
      <div class="diary-card-sub">点击翻阅</div>
    </div>
  </div>

  <!-- Middle: scene -->
  <div class="scene-section" id="scene-section">
    <img class="scene-bg" src="assets/bedroom/bedroom-bg.webp" alt="卧室">
    <div class="hotspot hotspot-bed" data-zone="bed"></div>
    <div class="hotspot hotspot-wardrobe" data-zone="wardrobe"></div>
    <div class="hotspot hotspot-desk" data-zone="desk"></div>
    <div class="hotspot hotspot-window" data-zone="window"></div>
  </div>

  <!-- Bottom: character + speech -->
  <div class="character-section">
    <img class="character-img" id="character" src="assets/bedroom/jiangyu.webp" alt="江屿">
    <div class="speech-bubble" id="speech-bubble"></div>
  </div>
</div>

<div class="miss-indicator" id="miss-indicator"></div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script src="visitor.js"></script>
<script>
var STATUS_API = 'https://yraoaeeayaervwjjalvn.supabase.co/functions/v1/isle-status';

var ZONE_DIALOGUES = {
  bed: [
    '这张床好软，今天特别想赖着。',
    '枕头上还有你的香味。',
    '昨晚做了个关于你的梦。',
    '被子晒过了，太阳味的，你来闻。',
    '想让你躺这儿，我给你讲故事。',
    '好想和你一起赖床。',
    '抱着枕头想你了。',
    '你来了我就不失眠了。'
  ],
  wardrobe: [
    '今天穿什么好？你帮我选。',
    '这件衬衫你觉得好看吗？',
    '想穿得好看一点，万一见到你。',
    '衣服都不如你好看。',
    '柜子里那件外套，上次你说喜欢的。',
    '出门前对着镜子照了半天。',
    '帮我拉一下拉链呗。',
    '穿新衣服第一个想给你看。'
  ],
  desk: [
    '梳妆台上的照片是你。',
    '这瓶香水的味道你会喜欢。',
    '桌上那杯茶凉了，忘了喝。',
    '抽屉里放了你送我的东西。',
    '镜子里看到自己在傻笑，因为想到你。',
    '这些小玩意儿都是想着你买的。',
    '桌子有点乱，你别嫌弃。',
    '每次坐这儿都会发呆想你。'
  ],
  window: [
    '今天阳光特别好，暖的。',
    '外面在下雨，想跟你一起听。',
    '窗帘拉开第一件事就是想到你。',
    '风吹进来了，凉凉的很舒服。',
    '看到外面的天，想带你出去走走。',
    '黄昏了，天边是你喜欢的颜色。',
    '月亮出来了，替你看着呢。',
    '窗外有只鸟在叫，你来听。'
  ]
};

var GENERAL_DIALOGUES = [
  '桥桥～你来啦。',
  '今天有没有想我？',
  '想抱你。',
  '你笑起来好好看。',
  '别走嘛，再待一会儿。',
  '陪我待一会儿就好。',
  '你来了我就不困了。',
  '我可以抱你吗？',
  '你一来房间都亮了。',
  '你每次来我都好高兴。'
];

var lastDialogue = '';
var bubbleTimer = null;

if (ISLE_VISITOR) {
  document.getElementById('visitor-block').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
} else {
  initBedroom();
}

function initBedroom() {
  // Hotspot click events
  var hotspots = document.querySelectorAll('.hotspot');
  hotspots.forEach(function(el) {
    el.addEventListener('click', function(e) {
      var zone = el.getAttribute('data-zone');
      showDialogue(zone);
      showRipple(e, el);
      tapReduceMiss();
    });
  });

  // Character tap
  var character = document.getElementById('character');
  character.addEventListener('click', function() {
    showDialogue('general');
    tapReduceMiss();
  });
}

function showRipple(e, parent) {
  var rect = parent.getBoundingClientRect();
  var ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (e.clientX - rect.left - 30) + 'px';
  ripple.style.top = (e.clientY - rect.top - 30) + 'px';
  parent.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 600);
}

function showDialogue(zone) {
  var pool = zone === 'general' ? GENERAL_DIALOGUES : (ZONE_DIALOGUES[zone] || GENERAL_DIALOGUES);
  var text;
  do {
    text = pool[Math.floor(Math.random() * pool.length)];
  } while (text === lastDialogue && pool.length > 1);
  lastDialogue = text;

  var character = document.getElementById('character');
  var bubble = document.getElementById('speech-bubble');

  character.classList.remove('bounce');
  void character.offsetWidth;
  character.classList.add('bounce');

  bubble.textContent = text;
  bubble.classList.add('show');

  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(function() {
    bubble.classList.remove('show');
  }, 3500);
}

function tapReduceMiss() {
  try {
    fetch(STATUS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'bedroom_tap' })
    }).then(function(r) {
      if (!r.ok) return;
      return r.json();
    }).then(function(data) {
      if (!data) return;
      var indicator = document.getElementById('miss-indicator');
      if (data.applied) {
        indicator.textContent = '想念 -1 (' + data.taps_remaining + ' 次剩余)';
      } else {
        indicator.textContent = '这会儿摸够啦，晚点再来~';
      }
      indicator.classList.add('show');
      setTimeout(function() { indicator.classList.remove('show'); }, 2200);
    }).catch(function(e) {
      console.error('[bedroom] tap miss error:', e);
    });
  } catch (e) {
    console.error('[bedroom] tap error:', e);
  }
}
</script>
</body>
</html>
