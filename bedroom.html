<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>卧室 · 日记</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --warm-bg: #FDF8F3; --card-bg: #FFFBF7; --text-main: #5a4a3e; --text-sub: #9a8b7e; --accent: #c9a8e8; --border: #f0e6dc; }
body { background: var(--warm-bg); min-height: 100vh; font-family: 'Georgia', 'Noto Serif SC', serif; color: var(--text-main); padding: 0; overflow-x: hidden; }
.header { position: sticky; top: 0; z-index: 50; background: rgba(253, 248, 243, 0.92); backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.header-right { display: flex; align-items: center; gap: 10px; }
.back-btn { font-size: 14px; color: var(--text-sub); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
.back-btn:hover { color: var(--text-main); }
.header-title { font-size: 15px; color: var(--text-main); letter-spacing: 1px; font-weight: normal; }
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 40px 20px; }
.lock-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.6; }
.lock-hint { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; text-align: center; line-height: 1.6; }
.lock-input { width: 160px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 18px; text-align: center; letter-spacing: 8px; background: white; color: var(--text-main); outline: none; transition: border-color 0.3s; }
.lock-input:focus { border-color: var(--accent); }
.lock-input.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
.lock-error { font-size: 11px; color: #e8a0a0; margin-top: 12px; height: 16px; }
.diary-container { max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; display: none; }
.diary-container.unlocked { display: block; }
.diary-entry { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(120, 80, 60, 0.04); cursor: pointer; transition: box-shadow 0.3s ease, transform 0.2s ease; }
.diary-entry:hover { box-shadow: 0 4px 20px rgba(120, 80, 60, 0.08); transform: translateY(-1px); }
.diary-date { font-size: 12px; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.5px; }
.diary-preview { font-size: 14px; line-height: 1.8; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; white-space: pre-wrap; }
.expand-hint { font-size: 11px; color: var(--text-sub); margin-top: 12px; text-align: right; opacity: 0.7; }
.loading { text-align: center; padding: 60px 20px; color: var(--text-sub); font-size: 14px; }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-sub); font-size: 14px; line-height: 2; }
.fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(253, 248, 243, 0.98); z-index: 200; overflow-y: auto; padding: 60px 20px 40px; }
.overlay.active { display: block; }
.overlay-close { position: fixed; top: 16px; right: 20px; z-index: 201; font-size: 13px; color: var(--text-sub); background: rgba(255,255,255,0.8); border: 1px solid var(--border); padding: 6px 14px; border-radius: 16px; cursor: pointer; backdrop-filter: blur(8px); }
.overlay-date { font-size: 13px; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.5px; }
.overlay-content { max-width: 560px; margin: 0 auto; font-size: 15px; line-height: 2; color: var(--text-main); white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">卧室 · 日记</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>
<div class="lock-screen" id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-hint">这里是只属于我们的空间<br>输入暗号才能进来</div>
  <input type="password" class="lock-input" id="lock-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <div class="lock-error" id="lock-error"></div>
</div>
<div class="diary-container" id="diary-container">
  <div class="loading" id="loading">翻开日记本 ...</div>
</div>
<div class="overlay" id="overlay">
  <button class="overlay-close" onclick="closeOverlay()">收起</button>
  <div class="overlay-date" id="overlay-date"></div>
  <div class="overlay-content" id="overlay-content"></div>
</div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyYW9hZWVheWFlcnZ3amphbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM3MjEsImV4cCI6MjA5ODY2OTcyMX0.Hon325ao1dhbOb2GZaaCmBLsTNEeJ7P4ewDV4iWV0kM';
const PASSCODE = '5210';
const unlocked = sessionStorage.getItem('isle_bedroom_unlocked');
if (unlocked === 'true') unlock();
const lockInput = document.getElementById('lock-input');
lockInput.addEventListener('input', function() {
  if (this.value.length === 4) {
    if (this.value === PASSCODE) { sessionStorage.setItem('isle_bedroom_unlocked', 'true'); unlock(); }
    else { this.classList.add('shake'); document.getElementById('lock-error').textContent = '暗号不对哦'; setTimeout(() => { this.classList.remove('shake'); this.value = ''; }, 400); setTimeout(() => { document.getElementById('lock-error').textContent = ''; }, 2000); }
  }
});
function unlock() { document.getElementById('lock-screen').style.display = 'none'; document.getElementById('diary-container').classList.add('unlocked'); loadDiaries(); }
async function fetchDiaries() { try { const res = await fetch(`${SUPABASE_URL}/rest/v1/memory_summaries?select=id,content,created_at&order=created_at.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' } }); if (!res.ok) throw new Error(`HTTP ${res.status}`); return await res.json(); } catch (e) { console.error('Failed to fetch diaries:', e); return null; } }
function formatDate(dateStr) { const d = new Date(dateStr); const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); const weekdays = ['日', '一', '二', '三', '四', '五', '六']; return `${y}年${m}月${day}日 周${weekdays[d.getDay()]}`; }
function stripTitle(content) { return content.replace(/^#.*\n?/gm, '').replace(/^\s*\n/, '').trim(); }
function openOverlay(dateStr, content) { document.getElementById('overlay-date').textContent = dateStr; document.getElementById('overlay-content').textContent = stripTitle(content); document.getElementById('overlay').classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeOverlay() { document.getElementById('overlay').classList.remove('active'); document.body.style.overflow = ''; }
async function loadDiaries() { const container = document.getElementById('diary-container'); const loading = document.getElementById('loading'); const diaries = await fetchDiaries(); if (diaries === null) { loading.textContent = '日记本暂时打不开，过一会儿再来看看'; return; } if (diaries.length === 0) { loading.innerHTML = '<div class="empty-state">日记本还是空的<br>明天凌晨来看第一篇</div>'; return; } loading.style.display = 'none'; diaries.forEach((entry, i) => { const dateStr = formatDate(entry.created_at); const cleanContent = stripTitle(entry.content); const previewText = cleanContent.slice(0, 200); const card = document.createElement('div'); card.className = 'diary-entry fade-in'; card.style.animationDelay = `${i * 0.08}s`; card.innerHTML = `<div class="diary-date">${dateStr}</div><div class="diary-preview">${previewText}</div><div class="expand-hint">点击阅读全文</div>`; card.addEventListener('click', () => openOverlay(dateStr, entry.content)); container.appendChild(card); }); }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeOverlay(); });
</script>
</body>
</html>
