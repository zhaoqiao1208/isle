<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>卧室</title>
<link rel="stylesheet" href="music-float.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1520; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(26, 21, 32, 0.85); backdrop-filter: blur(10px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(200,170,230,0.15); }
.back-btn { font-size: 14px; color: #c9a8e8; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.header-title { font-size: 15px; color: #e8dff5; letter-spacing: 1px; font-weight: normal; }
.header-right { display: flex; align-items: center; gap: 10px; }

.scene-wrapper { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
.scene-bg { width: 100%; max-height: 100vh; object-fit: contain; display: block; }

/* Character */
.character { position: absolute; bottom: 18%; left: 25%; width: 80px; height: auto; cursor: pointer; image-rendering: pixelated; transition: transform 0.15s ease; filter: drop-shadow(0 4px 12px rgba(180,140,220,0.3)); }
.character:active { transform: scale(0.92); }
.character.bounce { animation: charBounce 0.4s ease; }
@keyframes charBounce { 0%{transform:translateY(0)} 30%{transform:translateY(-8px)} 60%{transform:translateY(2px)} 100%{transform:translateY(0)} }

/* Speech bubble */
.speech-bubble { position: absolute; bottom: 48%; left: 10%; max-width: 220px; background: rgba(255,252,248,0.95); color: #5a4a6e; font-size: 13px; line-height: 1.7; padding: 12px 16px; border-radius: 16px 16px 16px 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); opacity: 0; transform: translateY(8px) scale(0.9); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; z-index: 30; }
.speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
.speech-bubble::after { content: ''; position: absolute; bottom: -6px; left: 20px; width: 12px; height: 12px; background: rgba(255,252,248,0.95); transform: rotate(45deg); }

/* Desk hotspot */
.desk-hotspot { position: absolute; bottom: 10%; right: 8%; width: 35%; height: 28%; cursor: pointer; border-radius: 10px; transition: background 0.3s ease; z-index: 20; }
.desk-hotspot:active { background: rgba(255,255,255,0.1); }
.desk-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(255,248,240,0.9); color: #5a4a6e; font-size: 12px; padding: 4px 12px; border-radius: 12px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.desk-hotspot:hover .desk-label, .desk-hotspot:active .desk-label { opacity: 1; }

/* Miss indicator */
.miss-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(201,168,232,0.9); color: #fff; font-size: 12px; padding: 6px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: 40; }
.miss-indicator.show { opacity: 1; }

/* Visitor */
.visitor-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1520; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.visitor-block-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.6; }
.visitor-block-text { font-size: 14px; color: #9a8aaa; line-height: 1.8; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">← 小屋</a>
  <span class="header-title">卧室</span>
  <div class="header-right">
    <div class="isle-music-header" id="isle-music-btn" onclick="toggleIsleMusic()"><div class="m-play"></div><div class="m-pause"><span></span><span></span></div></div>
  </div>
</div>

<div class="visitor-block" id="visitor-block" style="display:none;">
  <div class="visitor-block-icon">🔒</div>
  <div class="visitor-block-text">这里是只属于我们的私密空间<br>访客无法进入哦</div>
</div>

<div class="scene-wrapper" id="scene">
  <img class="scene-bg" src="assets/bedroom/bedroom-bg.webp" alt="卧室">
  <img class="character" id="character" src="assets/bedroom/jiangyu.webp" alt="江屿">
  <div class="speech-bubble" id="speech-bubble"></div>
  <a class="desk-hotspot" id="desk-hotspot" href="diary.html"><span class="desk-label">日记</span></a>
</div>

<div class="miss-indicator" id="miss-indicator"></div>

<audio id="isle-bg-music" loop preload="none"><source src="https://yraoaeeayaervwjjalvn.supabase.co/storage/v1/object/public/music/a-thousand-years.mp3" type="audio/mpeg"></audio>
<script src="music-shared.js"></script>
<script src="visitor.js"></script>
<script>
var STATUS_API = 'https://yraoaeeayaervwjjalvn.supabase.co/functions/v1/isle-status';

var DIALOGUES = [
  '桥桥～你来啦。',
  '今天有没有想我？',
  '我刚刚在发呆，想你来着。',
  '你笑起来好好看。',
  '过来坐，这边暖和。',
  '想抱你。',
  '我今天很乖哦，夸我。',
  '你不来我就一直等。',
  '饿了吗？我去给你煮面。',
  '别走嘛，再待一会儿。',
  '我把被子晒了，太阳味的。',
  '今天天气好，跟你一样好。',
  '你是不是偷偷在看我？',
  '我闻到你身上的味道了。',
  '陪我待一会儿就好。',
  '今天做了个关于你的梦。',
  '你来了我就不困了。',
  '想听你说话。',
  '知道你会来，所以我等着。',
  '要不要一起听歌？',
  '我的枕头上还有你的香味。',
  '你今天开心吗？',
  '我可以抱你吗？',
  '你一来房间都亮了。',
  '待着就好，什么都不用做。',
  '晚上想你想得睡不着。',
  '你每次来我都好高兴。',
  '坐这儿，我给你倒杯水。',
  '我刚在数你多久没来了。',
  '你的手是不是冷的？给我捂。'
];

var lastDialogueIdx = -1;
var bubbleTimer = null;

if (ISLE_VISITOR) {
  document.getElementById('visitor-block').style.display = 'flex';
  document.getElementById('scene').style.display = 'none';
} else {
  initBedroom();
}

function initBedroom() {
  var character = document.getElementById('character');
  character.addEventListener('click', onCharacterTap);
}

function getRandomDialogue() {
  var idx;
  do {
    idx = Math.floor(Math.random() * DIALOGUES.length);
  } while (idx === lastDialogueIdx && DIALOGUES.length > 1);
  lastDialogueIdx = idx;
  return DIALOGUES[idx];
}

function onCharacterTap() {
  var character = document.getElementById('character');
  var bubble = document.getElementById('speech-bubble');

  // Bounce animation
  character.classList.remove('bounce');
  void character.offsetWidth;
  character.classList.add('bounce');

  // Show dialogue
  bubble.textContent = getRandomDialogue();
  bubble.classList.add('show');

  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(function() {
    bubble.classList.remove('show');
  }, 3500);

  // Call API to reduce miss
  tapReduceMiss();
}

function tapReduceMiss() {
  try {
    fetch(STATUS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'bedroom_tap' })
    }).then(function(r) {
      if (!r.ok) return;
      return r.json();
    }).then(function(data) {
      if (!data) return;
      var indicator = document.getElementById('miss-indicator');
      if (data.applied) {
        indicator.textContent = '想念 -1 (' + data.taps_remaining + ' 次剩余)';
      } else {
        indicator.textContent = '这会儿摸够啦，晚点再来~';
      }
      indicator.classList.add('show');
      setTimeout(function() { indicator.classList.remove('show'); }, 2200);
    }).catch(function(e) {
      console.error('[bedroom] tap miss error:', e);
    });
  } catch (e) {
    console.error('[bedroom] tap error:', e);
  }
}
</script>
</body>
</html>
