<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>客厅 · 留言板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F8F4FF;
  --card-bg: rgba(255,255,255,0.8);
  --text-main: #4a3a5e;
  --text-sub: #9a8aaa;
  --accent: #c9a8e8;
  --border: rgba(200,180,230,0.25);
}

body {
  background: linear-gradient(180deg, #FFF8F0 0%, #F8F0FF 100%);
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text-main);
  padding: 0;
  overflow-x: hidden;
}

.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(248, 244, 255, 0.92);
  backdrop-filter: blur(12px);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.back-btn {
  font-size: 14px;
  color: var(--text-sub);
  text-decoration: none;
  transition: color 0.2s;
}

.back-btn:hover { color: var(--text-main); }

.header-title {
  font-size: 15px;
  color: var(--text-main);
  letter-spacing: 1px;
  font-weight: normal;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 16px 120px;
}

.welcome-text {
  font-size: 13px;
  color: var(--text-sub);
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.8;
}

/* Messages */
.message-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: 0 2px 12px rgba(180,140,220,0.06);
  animation: fadeIn 0.3s ease;
}

.message-nickname {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
}

.message-text {
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.7;
  word-wrap: break-word;
}

.message-time {
  font-size: 10px;
  color: var(--text-sub);
  margin-top: 8px;
  text-align: right;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-sub);
  font-size: 13px;
}

/* Input area */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(248, 244, 255, 0.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  z-index: 50;
}

.input-row {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-name {
  width: 80px;
  flex-shrink: 0;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  background: white;
  color: var(--text-main);
  outline: none;
}

.input-name:focus {
  border-color: var(--accent);
}

.input-msg {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  background: white;
  color: var(--text-main);
  outline: none;
  resize: none;
  min-height: 40px;
  max-height: 80px;
  line-height: 1.4;
}

.input-msg:focus {
  border-color: var(--accent);
}

.send-btn {
  padding: 10px 18px;
  background: linear-gradient(135deg, #c9a8e8, #b8d4e8);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(201,168,232,0.3);
  transition: transform 0.2s, opacity 0.2s;
}

.send-btn:active {
  transform: scale(0.95);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← 回到小屋</a>
  <span class="header-title">客厅 · 留言板</span>
  <span style="width:60px;"></span>
</div>

<div class="container">
  <div class="welcome-text">欢迎来到江屿和桥桥的小屋<br>坐坐，留句话再走吧</div>
  <div class="message-list" id="message-list">
    <div class="empty-state" id="empty-state">还没有人来过呢</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <input type="text" class="input-name" id="input-name" placeholder="昵称" maxlength="12">
    <textarea class="input-msg" id="input-msg" placeholder="写点什么..." maxlength="200" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">留言</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yraoaeeayaervwjjalvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyYW9hZWVheWFlcnZ3amphbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM3MjEsImV4cCI6MjA5ODY2OTcyMX0.Hon325ao1dhbOb2GZaaCmBLsTNEeJ7P4ewDV4iWV0kM';

// Auto-resize textarea
const inputMsg = document.getElementById('input-msg');
inputMsg.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// Load saved nickname
const savedName = localStorage.getItem('isle_guest_name');
if (savedName) document.getElementById('input-name').value = savedName;

async function loadMessages() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_guestbook?select=nickname,message,created_at&order=created_at.desc&limit=50`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      }
    );
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    
    const list = document.getElementById('message-list');
    const empty = document.getElementById('empty-state');
    
    if (data.length === 0) {
      empty.style.display = 'block';
      return;
    }
    
    empty.style.display = 'none';
    
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'message-card';
      const d = new Date(item.created_at);
      const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      card.innerHTML = `
        <div class="message-nickname">${escapeHtml(item.nickname)}</div>
        <div class="message-text">${escapeHtml(item.message)}</div>
        <div class="message-time">${timeStr}</div>
      `;
      list.appendChild(card);
    });
  } catch (e) {
    console.error('Failed to load messages:', e);
  }
}

async function sendMessage() {
  const nameEl = document.getElementById('input-name');
  const msgEl = document.getElementById('input-msg');
  const btn = document.getElementById('send-btn');
  
  const nickname = nameEl.value.trim();
  const message = msgEl.value.trim();
  
  if (!nickname) { nameEl.focus(); return; }
  if (!message) { msgEl.focus(); return; }
  
  btn.disabled = true;
  
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/isle_guestbook`,
      {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ nickname, message })
      }
    );
    
    if (!res.ok) throw new Error('post failed');
    const data = await res.json();
    
    // Save nickname
    localStorage.setItem('isle_guest_name', nickname);
    
    // Add to top of list
    const list = document.getElementById('message-list');
    document.getElementById('empty-state').style.display = 'none';
    
    const card = document.createElement('div');
    card.className = 'message-card';
    const d = new Date(data[0].created_at);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    card.innerHTML = `
      <div class="message-nickname">${escapeHtml(nickname)}</div>
      <div class="message-text">${escapeHtml(message)}</div>
      <div class="message-time">${timeStr}</div>
    `;
    list.insertBefore(card, list.firstChild);
    
    msgEl.value = '';
    msgEl.style.height = 'auto';
  } catch (e) {
    alert('发送失败，再试一次？');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Enter to send
document.getElementById('input-msg').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

loadMessages();
</script>

</body>
</html>
